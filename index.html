      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:"1rem"}}>
        <div style={ctit}>Absences ({fil.length})</div>
        <select style={{...inp,width:220}} value={sel} onChange={e=>setSel(e.target.value)}><option value="all">Tous</option>{emp.map(e=><option key={e.id} value={e.id}>{e.nom} {e.prenom}</option>)}</select>
      </div>
      {fil.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#94a3b8"}}><div style={{fontSize:"2rem",marginBottom:8}}>🌴</div>Aucune absence</div>
      :<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Collaborateur","Type","Début","Fin","Jours ouvrés","Note",""].map(h=><th key={h} style={th_}>{h}</th>)}</tr></thead>
        <tbody>{fil.map(c=>{const e=emp.find(x=>x.id===c.empId);const bt=c.type==="Maladie"?"ml":c.type==="Sans solde"?"ss":c.type==="Formation"?"fo":c.type==="Absence CFA"?"cfa":"cg";
          return<tr key={c.id} className="trh"><td style={td_}><b style={{color:BL}}>{e?.nom}</b> <span style={{color:"#64748b"}}>{e?.prenom}</span></td>
            <td style={td_}><Badge t={bt}>{c.type}</Badge></td><td style={td_}>{fd(c.debut)}</td><td style={td_}>{fd(c.fin)}</td>
            <td style={{...td_,color:"#16a34a",fontWeight:600}}>{c.jours}j</td>
            <td style={{...td_,color:"#94a3b8",fontSize:"0.74rem"}}>{c.note||"—"}</td>
            <td style={td_}><div style={{display:"flex",gap:4}}><Btn v="g" style={{padding:"3px 8px",fontSize:"0.7rem"}} onClick={()=>setEditC(c)}>✏</Btn><Btn v="d" style={{padding:"3px 8px",fontSize:"0.7rem"}} onClick={()=>delC(c.id)}>✕</Btn></div></td>
          </tr>;})}
        </tbody>
      </table></div>}
    </div>
  </div>;
}

function STSection({stListe,setStListe,stInter,setStInter,saveSTInter,vm,setVm}){
  const[activeSTId,setActiveSTId]=useState(stListe[0]?.id||null);
  const[showAddST,setShowAddST]=useState(false);
  const[showEditTarifs,setShowEditTarifs]=useState(null);
  const[tarifF,setTarifF]=useState({tauxJour:'',tauxNuit:'',tauxDeplIdf:'',tauxDeplHidf:''});
  const[showAddInter,setShowAddInter]=useState(false);
  const[showAddLigne,setShowAddLigne]=useState(null);
  const[stForm,setStForm]=useState({nom:"",type:"individuel"});
  const today=new Date();
  const dInter={stId:activeSTId,date:today.toISOString().slice(0,10),note:""};
  const[interF,setInterF]=useState(dInter);
  const dLigne={type:"heure",debut:"",fin:"",nbIdf:"",nbHidf:"",prixMat:"",note:""};
  const[ligneF,setLigneF]=useState(dLigne);

  function addST(){if(!stForm.nom.trim())return;const newId=Math.max(...stListe.map(s=>s.id),0)+1;setStListe(p=>[...p,{id:newId,nom:stForm.nom.toUpperCase(),type:stForm.type}]);setActiveSTId(newId);setShowAddST(false);setStForm({nom:"",type:"individuel"});}
  function addInter(){if(!interF.stId||!interF.date)return;const newId=`i_${Date.now()}`;const newInter=[...stInter,{id:newId,stId:Number(interF.stId),date:interF.date,note:interF.note,lignes:[]}];setStInter(newInter);setShowAddInter(false);setInterF({...dInter,stId:activeSTId});}
  async function addLigne(interId){
    const{type,debut,fin,nbIdf,nbHidf,prixMat,note}=ligneF;let ligne={id:`l_${Date.now()}`,type,note};
    if(type==="heure"){const h=calcH(debut,fin,0);ligne={...ligne,debut,fin,total:h.total,jour:h.jour,nuit:h.nuit};}
    else if(type==="idf"){ligne={...ligne,nombre:Number(nbIdf)||0};}
    else if(type==="hidf"){ligne={...ligne,heures:Number(nbHidf)||0};}
    else if(type==="materiaux"){ligne={...ligne,prix:Number(prixMat)||0};}
    const newInter=stInter.map(i=>i.id===interId?{...i,lignes:[...i.lignes,ligne]}:i);
    setStInter(newInter);setShowAddLigne(null);setLigneF(dLigne);
    await saveSTInter(newInter);
  }
  async function delInter(id){const newInter=stInter.filter(i=>i.id!==id);setStInter(newInter);await saveSTInter(newInter);}
  async function delLigne(interId,ligneId){const newInter=stInter.map(i=>i.id===interId?{...i,lignes:i.lignes.filter(l=>l.id!==ligneId)}:i);setStInter(newInter);await saveSTInter(newInter);}

  const activeST=stListe.find(s=>s.id===activeSTId);
  const interST=stInter.filter(i=>i.stId===activeSTId&&mk(i.date)===vm).sort((a,b)=>new Date(b.date)-new Date(a.date));

  function stStats(stId,month){
    const inters=stInter.filter(i=>i.stId===stId&&mk(i.date)===month);
    let totH=0,totNuit=0,totJour=0,totIdf=0,totHidf=0,totMat=0;
    inters.forEach(i=>{i.lignes.forEach(l=>{
      if(l.type==="heure"){totH+=Number(l.total)||0;totNuit+=Number(l.nuit)||0;totJour+=Number(l.jour)||0;}
      else if(l.type==="idf")totIdf+=Number(l.nombre)||0;
      else if(l.type==="hidf")totHidf+=Number(l.heures)||0;
      else if(l.type==="materiaux")totMat+=Number(l.prix)||0;
    });});
    const st=stListe.find(s=>s.id===stId)||{};
    const mJour=totJour*(st.tauxJour||0);
    const mNuit=totNuit*(st.tauxNuit||0);
    const mIdf=totIdf*(st.tauxDeplIdf||0);
    const mHidf=totHidf*(st.tauxDeplHidf||0);
    const mTotal=mJour+mNuit+mIdf+mHidf+totMat;
    return{totH,totNuit,totJour,totIdf,totHidf,totMat,nbInter:inters.length,mJour,mNuit,mIdf,mHidf,mTotal};
  }

  function exportST(){
    const[y,m]=vm.split("-").map(Number);const label=`${MOIS[m-1]}_${y}`;
    const wb=XLSX.utils.book_new();
    const BL="1e3a6e",BLL="e8eef7",GR="f8fafc",WH="FFFFFF",GR2="64748b";
    
    stListe.forEach(st=>{
      const inters=stInter.filter(i=>i.stId===st.id&&mk(i.date)===vm);
      const wsData=[];
      // En-tête titre
      wsData.push([`${st.nom} — ${MOIS[m-1]} ${y}`, "", "", "", "", "", "", "", "", "", ""]);
      wsData.push([`Tarifs : Jour ${st.tauxJour||0}€/h · Nuit ${st.tauxNuit||0}€/h · Dépl. IDF ${st.tauxDeplIdf||0}€ · Dépl. Hors IDF ${st.tauxDeplHidf||0}€/h`, "", "", "", "", "", "", "", "", "", ""]);
      wsData.push([""]);
      // En-têtes colonnes
      wsData.push(["DATE","INTERVENTION","TYPE","DÉTAIL","H. JOUR","H. NUIT","DÉPL. IDF","DÉPL. HIDF","MATÉRIAUX","MONTANT","NOTE"]);
      
      let totJour=0,totNuit=0,totIdf=0,totHidf=0,totMat=0,totMontant=0;
      
      inters.forEach(inter=>{
        inter.lignes.forEach(l=>{
          let detail="",montant=0;
          if(l.type==="heure"){
            detail=`${l.debut||""}→${l.fin||""} (${fmt(Number(l.total||0))})`;
            montant=((Number(l.jour)||0)*(st.tauxJour||0))+((Number(l.nuit)||0)*(st.tauxNuit||0));
            totJour+=Number(l.jour)||0;totNuit+=Number(l.nuit)||0;
          } else if(l.type==="idf"){
            detail=`${l.nombre||0} déplacement(s)`;
            montant=(Number(l.nombre)||0)*(st.tauxDeplIdf||0);
            totIdf+=Number(l.nombre)||0;
          } else if(l.type==="hidf"){
            detail=`${l.heures||0}h hors IDF`;
            montant=(Number(l.heures)||0)*(st.tauxDeplHidf||0);
            totHidf+=Number(l.heures)||0;
          } else if(l.type==="materiaux"){
            detail=`Fournitures`;
            montant=Number(l.prix)||0;
            totMat+=Number(l.prix)||0;
          }
          totMontant+=montant;
          wsData.push([
            inter.date,inter.note||"",
            l.type==="heure"?"Heures":l.type==="idf"?"Dépl. IDF":l.type==="hidf"?"Dépl. Hors IDF":"Matériaux",
            detail,
            l.type==="heure"?(Number(l.jour)||0).toFixed(2):"",
            l.type==="heure"?(Number(l.nuit)||0).toFixed(2):"",
            l.type==="idf"?(l.nombre||0):"",
            l.type==="hidf"?(l.heures||0):"",
            l.type==="materiaux"?(Number(l.prix)||0).toFixed(2):"",
            montant.toFixed(2)+"€",
            l.note||""
          ]);
        });
      });
      
      wsData.push([""]);
      wsData.push(["TOTAL","","","",totJour.toFixed(2),totNuit.toFixed(2),totIdf,totHidf.toFixed(2),totMat.toFixed(2),totMontant.toFixed(2)+"€",""]);
      
      const ws=XLSX.utils.aoa_to_sheet(wsData);
      // Largeurs colonnes
      ws["!cols"]=[{wch:12},{wch:18},{wch:14},{wch:20},{wch:8},{wch:8},{wch:9},{wch:9},{wch:10},{wch:12},{wch:16}];
      // Fusionner titre
      ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:10}},{s:{r:1,c:0},e:{r:1,c:10}}];
      
      const sheetName=st.nom.substring(0,31);
      XLSX.utils.book_append_sheet(wb,ws,sheetName);
    });
    
    // Feuille récap globale
    const recapData=[
      [`PHASELLUS BATIMENT — SOUS-TRAITANTS ${MOIS[m-1].toUpperCase()} ${y}`],[""],
      ["SOUS-TRAITANT","H. JOUR","H. NUIT","DÉPL. IDF","DÉPL. HIDF","MATÉRIAUX","TOTAL DÛ","TARIF JOUR","TARIF NUIT","TARIF DÉP."]
    ];
    let grandTotal=0;
    stListe.forEach(st=>{
      const s=stInter.filter(i=>i.stId===st.id&&mk(i.date)===vm);
      let tJ=0,tN=0,tI=0,tH=0,tM=0;
      s.forEach(i=>i.lignes.forEach(l=>{
        if(l.type==="heure"){tJ+=Number(l.jour)||0;tN+=Number(l.nuit)||0;}
        else if(l.type==="idf")tI+=Number(l.nombre)||0;
        else if(l.type==="hidf")tH+=Number(l.heures)||0;
        else if(l.type==="materiaux")tM+=Number(l.prix)||0;
      }));
      const total=tJ*(st.tauxJour||0)+tN*(st.tauxNuit||0)+tI*(st.tauxDeplIdf||0)+tH*(st.tauxDeplHidf||0)+tM;
      grandTotal+=total;
      recapData.push([st.nom,tJ.toFixed(2),tN.toFixed(2),tI,tH.toFixed(2),tM.toFixed(2),total.toFixed(2)+"€",`${st.tauxJour||0}€`,`${st.tauxNuit||0}€`,`${st.tauxDeplIdf||0}€`]);
    });
    recapData.push(["TOTAL GÉNÉRAL","","","","","",grandTotal.toFixed(2)+"€","","",""]);
    
    const wsRecap=XLSX.utils.aoa_to_sheet(recapData);
    wsRecap["!cols"]=[{wch:20},{wch:9},{wch:9},{wch:9},{wch:9},{wch:10},{wch:12},{wch:10},{wch:10},{wch:10}];
    wsRecap["!merges"]=[{s:{r:0,c:0},e:{r:0,c:9}}];
    XLSX.utils.book_append_sheet(wb,wsRecap,"Récapitulatif",true);
    
    if(stInter.filter(i=>mk(i.date)===vm).length===0){alert("Aucune intervention ce mois.");return;}
    XLSX.writeFile(wb,`Phasellus_SousTraitants_${label}.xlsx`);
  }

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:"1rem"}}>
      <h2 style={{fontWeight:800,fontSize:"1.05rem",color:BL}}>🔧 Sous-traitants</h2>
      <div style={{display:"flex",gap:8}}><Btn v="s" style={{fontSize:"0.76rem"}} onClick={exportST}>📊 Export ST</Btn><Btn v="g" style={{fontSize:"0.76rem"}} onClick={()=>setShowAddST(true)}>👤 Nouveau ST</Btn></div>
    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:"12px 12px 0 0",display:"flex",flexWrap:"wrap",overflowX:"auto"}}>
      {stListe.map(st=><button key={st.id} onClick={()=>setActiveSTId(st.id)} style={{padding:"10px 18px",background:"transparent",border:"none",borderBottom:activeSTId===st.id?"3px solid "+BL:"3px solid transparent",color:activeSTId===st.id?BL:"#64748b",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:"0.8rem",whiteSpace:"nowrap",cursor:"pointer"}}>{st.nom}</button>)}
    </div>
    {activeST&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 12px 12px",padding:"1.5rem",marginBottom:"1.2rem"}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        <MNav vm={vm} setVm={setVm}/>
        <Btn v="p" style={{fontSize:"0.78rem"}} onClick={()=>{setInterF({...dInter,stId:activeSTId});setShowAddInter(true);}}>✚ Nouvelle intervention</Btn>
        <Btn v="g" style={{fontSize:"0.76rem"}} onClick={()=>setShowEditTarifs(activeSTId)}>Modifier tarifs</Btn>
      </div>
      {(()=>{const s=stStats(activeSTId,vm);return <div style={{display:"flex",gap:"0.8rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        <SB col={BL} label="Interventions" val={s.nbInter}/><SB col="#7c3aed" label="Heures" val={fmt(s.totH)} sub={`Nuit: ${fmt(s.totNuit)}`}/>
        <SB col="#0369a1" label="Dépl. IDF" val={`${s.totIdf} dép.`}/><SB col="#d97706" label="Dépl. Hors IDF" val={`${s.totHidf}h`}/><SB col="#16a34a" label="Matériaux" val={`${s.totMat.toLocaleString("fr-FR")}€`}/>
      </div>;})()}
      {interST.length===0?<div style={{textAlign:"center",padding:"3rem",color:"#94a3b8"}}><div style={{fontSize:"2rem",marginBottom:8}}>🔧</div>Aucune intervention ce mois</div>
      :interST.map(inter=><div key={inter.id} style={{border:"1px solid #e2e8f0",borderRadius:10,marginBottom:"1rem",overflow:"hidden"}}>
        <div style={{background:"#f8fafc",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #e2e8f0"}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <span style={{fontWeight:700,color:BL}}>📅 {fd(inter.date)}</span>
            {inter.note&&<span style={{fontSize:"0.76rem",color:"#64748b"}}>{inter.note}</span>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn v="g" style={{padding:"4px 12px",fontSize:"0.72rem"}} onClick={()=>{setLigneF(dLigne);setShowAddLigne(inter.id);}}>+ Ajouter ligne</Btn>
            <Btn v="d" style={{padding:"4px 10px",fontSize:"0.72rem"}} onClick={()=>delInter(inter.id)}>✕</Btn>
          </div>
        </div>
        {inter.lignes.length===0?<div style={{padding:"1rem",color:"#94a3b8",fontSize:"0.8rem",textAlign:"center"}}>Aucune ligne — ajoutez des prestations</div>
        :<table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Type","Détail","Note",""].map(h=><th key={h} style={{...th_,padding:"8px 12px"}}>{h}</th>)}</tr></thead>
          <tbody>{inter.lignes.map(l=><tr key={l.id} className="trh">
            <td style={td_}>{l.type==="heure"&&<Badge t="heure">⏱ Heures</Badge>}{l.type==="idf"&&<Badge t="idf">🚗 Dépl. IDF</Badge>}{l.type==="hidf"&&<Badge t="hidf">🛣 Hors IDF</Badge>}{l.type==="materiaux"&&<Badge t="mat">🧱 Matériaux</Badge>}</td>
            <td style={td_}>
              {l.type==="heure"&&<span><b style={{color:BL}}>{fmt(Number(l.total))}</b> <span style={{color:"#d97706",fontSize:"0.78rem"}}>☀️{fmt(Number(l.jour))}</span> <span style={{color:"#7c3aed",fontSize:"0.78rem"}}>🌙{fmt(Number(l.nuit))}</span> <span style={{color:"#94a3b8",fontSize:"0.74rem"}}>{l.debut}→{l.fin}</span></span>}
              {l.type==="idf"&&<span><b style={{color:"#0369a1",fontSize:"1rem"}}>{l.nombre}</b> <span style={{color:"#64748b",fontSize:"0.78rem"}}>déplacement{Number(l.nombre)>1?"s":""}</span></span>}
              {l.type==="hidf"&&<span><b style={{color:"#d97706"}}>{l.heures}h</b> <span style={{color:"#64748b",fontSize:"0.78rem"}}>hors IDF</span></span>}
              {l.type==="materiaux"&&<span><b style={{color:"#16a34a"}}>{Number(l.prix).toLocaleString("fr-FR")}€</b></span>}
            </td>
            <td style={{...td_,color:"#94a3b8",fontSize:"0.76rem"}}>{l.note||"—"}</td>
            <td style={td_}><Btn v="d" style={{padding:"3px 8px",fontSize:"0.7rem"}} onClick={()=>delLigne(inter.id,l.id)}>✕</Btn></td>
          </tr>)}</tbody>
        </table>}
      </div>)}
    </div>}

    {showEditTarifs&&(()=>{
      const st2=stListe.find(s=>s.id===showEditTarifs);
      if(!st2)return null;
      return <div style={modal_} onClick={e=>e.target===e.currentTarget&&setShowEditTarifs(null)}>
        <div style={{...mbox_,maxWidth:460}}>
          <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL}}> Tarifs — {st2.nom}</div>
          <AL t="i">Modifiez les tarifs en cas de renégociation. Les calculs seront mis à jour automatiquement.</AL>
          <Row n={2}>
            <F label="Taux heure jour (€)"><input type="number" style={inp} defaultValue={st2.tauxJour||0} id="tj" step="0.5"/></F>
            <F label="Taux heure nuit (€)"><input type="number" style={inp} defaultValue={st2.tauxNuit||0} id="tn" step="0.5"/></F>
          </Row>
          <Row n={2}>
            <F label="Déplacement IDF (€/dép.)"><input type="number" style={inp} defaultValue={st2.tauxDeplIdf||0} id="ti" step="0.5"/></F>
            <F label="Déplacement Hors IDF (€/h)"><input type="number" style={inp} defaultValue={st2.tauxDeplHidf||0} id="th" step="0.5"/></F>
          </Row>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}>
            <Btn v="g" onClick={()=>setShowEditTarifs(null)}>Annuler</Btn>
            <Btn v="p" onClick={()=>{
              const tj=Number(document.getElementById('tj').value)||0;
              const tn=Number(document.getElementById('tn').value)||0;
              const ti=Number(document.getElementById('ti').value)||0;
              const th=Number(document.getElementById('th').value)||0;
              setStListe(p=>p.map(s=>s.id===showEditTarifs?{...s,tauxJour:tj,tauxNuit:tn,tauxDeplIdf:ti,tauxDeplHidf:th}:s));
              setShowEditTarifs(null);
            }}>✔ Enregistrer les tarifs</Btn>
          </div>
        </div>
      </div>;
    })()}
    {showAddST&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&setShowAddST(false)}>
      <div style={{...mbox_,maxWidth:420}}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.2rem",color:BL}}>👤 Nouveau sous-traitant</div>
        <F label="Nom"><input type="text" style={inp} value={stForm.nom} placeholder="NOM" onChange={e=>setStForm(p=>({...p,nom:e.target.value.toUpperCase()}))}/></F>
        <div style={{marginBottom:"0.8rem"}}><F label="Type"><select style={inp} value={stForm.type} onChange={e=>setStForm(p=>({...p,type:e.target.value}))}><option value="individuel">Individuel</option><option value="societe">Société</option></select></F></div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={()=>setShowAddST(false)}>Annuler</Btn><Btn v="p" onClick={addST}>✔ Ajouter</Btn></div>
      </div>
    </div>}
    {showAddInter&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&setShowAddInter(false)}>
      <div style={{...mbox_,maxWidth:420}}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.2rem",color:BL}}>📅 Nouvelle intervention — {activeST?.nom}</div>
        <F label="Date"><input type="date" style={inp} value={interF.date} onChange={e=>setInterF(p=>({...p,date:e.target.value}))}/></F>
        <div style={{marginBottom:"0.8rem"}}><F label="Note / Chantier"><input type="text" style={inp} value={interF.note} placeholder="Description…" onChange={e=>setInterF(p=>({...p,note:e.target.value}))}/></F></div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10}}><Btn v="g" onClick={()=>setShowAddInter(false)}>Annuler</Btn><Btn v="p" onClick={addInter}>✔ Créer</Btn></div>
      </div>
    </div>}
    {showAddLigne&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&setShowAddLigne(null)}>
      <div style={{...mbox_,maxWidth:500}}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.2rem",color:BL}}>➕ Ajouter une ligne</div>
        <F label="Type de prestation">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:"1rem"}}>
            {[{v:"heure",l:"⏱ Heures travaillées",c:"#7c3aed"},{v:"idf",l:"🚗 Déplacement IDF",c:"#0369a1"},{v:"hidf",l:"🛣 Déplacement Hors IDF",c:"#d97706"},{v:"materiaux",l:"🧱 Matériaux",c:"#16a34a"}].map(opt=><div key={opt.v} onClick={()=>setLigneF(p=>({...p,type:opt.v}))} style={{padding:"10px 14px",borderRadius:8,border:`2px solid ${ligneF.type===opt.v?opt.c:"#e2e8f0"}`,background:ligneF.type===opt.v?`${opt.c}10`:"#fff",cursor:"pointer",textAlign:"center",fontWeight:600,fontSize:"0.82rem",color:ligneF.type===opt.v?opt.c:"#64748b"}}>{opt.l}</div>)}
          </div>
        </F>
        {ligneF.type==="heure"&&<Row n={2}><F label="Début"><input type="time" style={inp} value={ligneF.debut} onChange={e=>setLigneF(p=>({...p,debut:e.target.value}))}/></F><F label="Fin"><input type="time" style={inp} value={ligneF.fin} onChange={e=>setLigneF(p=>({...p,fin:e.target.value}))}/></F></Row>}
        {ligneF.type==="idf"&&<F label="Nombre de déplacements IDF"><input type="number" style={inp} value={ligneF.nbIdf} min="1" onChange={e=>setLigneF(p=>({...p,nbIdf:e.target.value}))}/></F>}
        {ligneF.type==="hidf"&&<F label="Durée Hors IDF (heures)"><input type="number" style={inp} value={ligneF.nbHidf} min="0" step="0.5" onChange={e=>setLigneF(p=>({...p,nbHidf:e.target.value}))}/></F>}
        {ligneF.type==="materiaux"&&<F label="Montant (€)"><input type="number" style={inp} value={ligneF.prixMat} min="0" step="0.01" onChange={e=>setLigneF(p=>({...p,prixMat:e.target.value}))}/></F>}
        <div style={{marginTop:"0.8rem"}}><F label="Note"><input type="text" style={inp} value={ligneF.note} onChange={e=>setLigneF(p=>({...p,note:e.target.value}))}/></F></div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={()=>setShowAddLigne(null)}>Annuler</Btn><Btn v="p" onClick={()=>addLigne(showAddLigne)}>✔ Ajouter</Btn></div>
      </div>
    </div>}
  </div>;
}

              <span style={{color:"#94a3b8",fontSize:"0.62rem",gridColumn:"1/-1",marginTop:4,fontWeight:700}}>CE MOIS</span>

              {sm&&sm.fraisT>0&&<><span style={{color:"#64748b"}}>Frais</span><span style={{color:"#d97706",fontWeight:600}}>{sm.fraisT.toFixed(2)}€</span></>}

// PLANNING HEBDOMADAIRE
// ════════════════════════════════════════════════════════════
function Planning({planning,setPlanning,emp,stListe}){
  const today=new Date();
  // Obtenir le lundi de la semaine courante
  function getLundi(d){
    const day=d.getDay();const diff=d.getDate()-(day===0?6:day-1);
    return new Date(d.setDate(diff));
  }
  const[semDebut,setSemDebut]=useState(()=>{const d=new Date();return getLundi(d);});
  const[showAddInter,setShowAddInter]=useState(null); // {date}
  const[editInter,setEditInter]=useState(null);
  const[showExport,setShowExport]=useState(false);

  const JOURS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
  const JOURS_COURT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

  // 7 jours de la semaine
  const jours=Array.from({length:7},(_,i)=>{
    const d=new Date(semDebut);d.setDate(semDebut.getDate()+i);return d;
  });

  function fmtDate(d){return d.toISOString().slice(0,10);}
  function fmtAff(d){return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});}
  function semSuiv(){const d=new Date(semDebut);d.setDate(d.getDate()+7);setSemDebut(d);}
  function semPrec(){const d=new Date(semDebut);d.setDate(d.getDate()-7);setSemDebut(d);}
  function semCourante(){setSemDebut(getLundi(new Date()));}

  const fin=new Date(semDebut);fin.setDate(fin.getDate()+6);
  const labelSem="Semaine du "+semDebut.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})+" au "+fin.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});

  // Interventions de la semaine
  function getInters(date){
    return planning.filter(p=>p.date===fmtDate(date)).sort((a,b)=>a.horaire?.localeCompare(b.horaire||"")||0);
  }

  // Couleurs par technicien
  const COLORS=["#dbeafe","#dcfce7","#fef9c3","#fce7f3","#ede9fe","#ffedd5","#f0fdf4","#e0f2fe","#fef2f2","#f5f3ff","#ecfdf5","#fff7ed","#fef3c7"];
  const empColors={};
  emp.forEach((e,i)=>empColors[e.id]=COLORS[i%COLORS.length]);

  const dInter={date:"",magasin:"",bdc:"",descriptif:"",horaire:"",techniciens:[],livreur:""};
  const[form,setForm]=useState(dInter);

  function addInter(){
    if(!form.date||!form.magasin)return;
    setPlanning(p=>[...p,{id:"pl_"+Date.now(),...form}]);
    setShowAddInter(null);setForm(dInter);
  }
  function saveEditInter(){
    setPlanning(p=>p.map(x=>x.id===editInter.id?editInter:x));
    setEditInter(null);
  }
  function delInter(id){setPlanning(p=>p.filter(x=>x.id!==id));}

  function toggleTech(eid){
    setForm(f=>({...f,techniciens:f.techniciens.includes(eid)?f.techniciens.filter(x=>x!==eid):[...f.techniciens,eid]}));
  }
  function toggleTechEdit(eid){
    setEditInter(f=>({...f,techniciens:f.techniciens?.includes(eid)?f.techniciens.filter(x=>x!==eid):[...(f.techniciens||[]),eid]}));
  }

  // Export planning HTML imprimable
  function exportPlanning(){
    var label = labelSem;
    var rows = "";
    jours.forEach(function(jour, i){
      var inters = getInters(jour);
      var cells = "";
      inters.forEach(function(inter){
        var techs = (inter.techniciens||[]).map(function(id){
          var e=emp.find(function(x){return x.id===id;});
          var st=stListe.find(function(x){return "st_"+x.id===id;});
          return e ? e.nom+" "+e.prenom : st ? st.nom : id;
        }).join(", ") || "—";
        cells += '<div style="background:#e8eef7;border-radius:6px;padding:6px;margin-bottom:6px;font-size:11px">';
        cells += '<b style="color:#1e3a6e;font-size:12px">'+(inter.magasin||"")+"</b><br>";
        if(inter.bdc) cells += '<span style="color:#64748b">BDC: '+inter.bdc+"</span><br>";
        if(inter.descriptif) cells += "<span>"+inter.descriptif+"</span><br>";
        if(inter.horaire) cells += '<b style="color:#d97706">&#9200; '+inter.horaire+"</b><br>";
        cells += '<span style="color:#16a34a">&#128119; '+techs+"</span><br>";
        if(inter.livreur) cells += '<span style="color:#7c3aed">&#128666; '+inter.livreur+"</span>";
        cells += "</div>";
      });
      rows += '<td style="vertical-align:top;padding:8px;border:1px solid #e2e8f0;min-width:130px">'+cells+"</td>";
    });

    var ths = "";
    JOURS.forEach(function(j,i){
      ths += "<th>"+j+"<br><span style='font-weight:normal;font-size:11px'>"+fmtAff(jours[i])+"</span></th>";
    });

    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>";
    html += "<title>Planning Phasellus</title>";
    html += "<style>body{font-family:Arial,sans-serif;margin:20px;}";
    html += "h1{color:#1e3a6e;font-size:16px;}";
    html += "h2{color:#64748b;font-size:13px;font-weight:normal;}";
    html += "table{width:100%;border-collapse:collapse;}";
    html += "th{background:#1e3a6e;color:white;padding:10px;font-size:12px;border:1px solid #1e3a6e;}</style></head><body>";
    html += "<h1>PHASELLUS BATIMENT — PLANNING HEBDOMADAIRE</h1>";
    html += "<h2>"+label+"</h2>";
    html += "<table><thead><tr>"+ths+"</tr></thead><tbody><tr>"+rows+"</tr></tbody></table>";
    html += "<p style='margin-top:20px;font-size:10px;color:#94a3b8'>Document genere le "+new Date().toLocaleDateString("fr-FR")+"</p>";
    html += "</body></html>";

    var blob = new Blob([html], {type:"text/html;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Planning_Phasellus.html";
    a.click();
  }
