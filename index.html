async function sheetRead(sheetName){
  try{
    const r=await fetch(`${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheetName)}`);
    if(!r.ok)return[];
    const d=await r.json();
    return Array.isArray(d)?d:[];
  }catch{return[];}
}

async function sheetWrite(sheetName,values){
  try{
    const r=await fetch(APPS_SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({sheet:sheetName,action:"write",values})
    });
    const d=await r.json();
    return d.status==="ok";
  }catch{return false;}
}

// Convertir tableau Google Sheets → objets
function rowsToObjects(rows){
  if(!rows||rows.length<2)return[];
  const headers=rows[0];
  return rows.slice(1).map(row=>Object.fromEntries(headers.map((h,i)=>[h,row[i]||""])));
}

function pmn(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function calcH(d,f,p=0){
  if(!d||!f)return{total:0,jour:0,nuit:0};
  let dm=pmn(d),fm=pmn(f);if(fm<=dm)fm+=1440;
  const tot=fm-dm-p;if(tot<=0)return{total:0,jour:0,nuit:0};
  let nuit=0;for(let i=dm;i<dm+tot;i++){const x=i%1440;if(x>=1260||x<360)nuit++;}
  return{total:tot/60,jour:(tot-nuit)/60,nuit:nuit/60};
}
function fmt(h){if(!h||isNaN(h))return"0h00";const s=h<0?"-":"";const a=Math.abs(h);return`${s}${Math.floor(a)}h${Math.round((a-Math.floor(a))*60).toString().padStart(2,"0")}`;}
function fd(d){if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function mk(d){return d?d.slice(0,7):"";}
function yk(d){return d?d.slice(0,4):"";}
function jOuv(d1,d2){if(!d1||!d2)return 0;let d=new Date(d1+"T12:00:00"),e=new Date(d2+"T12:00:00"),c=0;while(d<=e){if(d.getDay()!==0&&d.getDay()!==6)c++;d.setDate(d.getDate()+1);}return c;}
function heuresProrata(hm, debutStr, moisStr) {
  // Si le mois en cours est le mois de début, proratiser
  if (!debutStr || !moisStr) return hm;
  const debutMois = debutStr.slice(0,7);
  if (debutMois !== moisStr) return hm;
  // Calculer jours ouvrés du mois
  const [y,m] = moisStr.split('-').map(Number);
  const debut = new Date(debutStr + 'T12:00:00');
  const finMois = new Date(y, m, 0); // dernier jour du mois
  let totalOuvres = 0, depuisDebut = 0;
  let d = new Date(y, m-1, 1);
  while (d <= finMois) {
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      totalOuvres++;
      if (d >= debut) depuisDebut++;
    }
    d.setDate(d.getDate() + 1);
  }
  if (totalOuvres === 0) return hm;
  return Math.round((hm * depuisDebut / totalOuvres) * 100) / 100;
}

function cpAcquis(debutStr){
  if(!debutStr)return 0;const debut=new Date(debutStr+"T12:00:00");const now=new Date();if(debut>now)return 0;
  let mois=0,d=new Date(debut);while(true){const next=new Date(d);next.setMonth(next.getMonth()+1);if(next>now)break;mois++;d=next;}
  return Math.round(mois*2.5*10)/10;
}

function xCSV(data,fn){
  if(!data||!data.length)return;
  const h=Object.keys(data[0]);
  const rows=[h.join(";"),...data.map(r=>h.map(k=>{const v=r[k];return typeof v==="string"&&(v.includes(";")||v.includes("\n"))?`"${v}"`:v??"";}).join(";"))];
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8"}));a.download=fn;a.click();
}

// CALCUL STATS
// ══════════════════════════════════════════════
function calcStats(eid,pts,cgs,emp,filt){
  const e=emp.find(x=>x.id===eid);if(!e)return null;
  const p=pts.filter(p=>{
    if(p.empId!==eid)return false;
    if(!filt)return true;
    if(filt.m)return mk(p.date)===filt.m;
    if(filt.y)return yk(p.date)===filt.y;
    return true;
  });
  const tH=p.reduce((s,x)=>s+(Number(x.total)||0),0);
  const nH=p.reduce((s,x)=>s+(Number(x.nuit)||0),0);
  const jH=p.reduce((s,x)=>s+(Number(x.jour)||0),0);
  const gdH=p.reduce((s,x)=>s+(Number(x.grandDeplacement)||0),0);
  const fraisT=p.reduce((s,x)=>s+(Number(x.frais)||0),0);
  let con=e.hm;if(filt?.y)con=e.hm*12;
  const supH=Math.max(0,tH-con),manH=Math.max(0,con-tH);
  const acq=cpAcquis(e.debut);
  const cpP=cgs.filter(c=>c.empId===eid&&c.type==="CP").reduce((s,c)=>s+(Number(c.jours)||0),0);
  const mlP=cgs.filter(c=>c.empId===eid&&(c.type==="Maladie"||c.type==="Absence CFA")).reduce((s,c)=>s+(Number(c.jours)||0),0);
  const ssP=cgs.filter(c=>c.empId===eid&&c.type==="Sans solde").reduce((s,c)=>s+(Number(c.jours)||0),0);
  return{tH,nH,jH,gdH,fraisT,supH,manH,con,acq,sCP:Math.max(0,acq-cpP),cpP,mlP,ssP,pts:p,e};
}

    setLoading(false);
  }

  // ── SAUVEGARDE VERS GOOGLE SHEETS ────────────
  async function savePointages(newPts){
    setSyncStatus("saving");
    const headers=["id","empId","date","debut","fin","pause","total","jour","nuit","grandDeplacement","frais","fraisNote","note"];
    const rows=[headers,...newPts.map(p=>headers.map(h=>p[h]??""))];
    const ok=await sheetWrite(SHEETS.POINTAGES,rows);
    setSyncStatus(ok?"ok":"error");
    setLastSync(new Date());
    // sync silencieux
  }

  async function saveConges(newCgs){
    setSyncStatus("saving");
    const headers=["id","empId","type","debut","fin","jours","note"];
    const rows=[headers,...newCgs.map(c=>headers.map(h=>c[h]??""))];
    const ok=await sheetWrite(SHEETS.CONGES,rows);
    setSyncStatus(ok?"ok":"error");setLastSync(new Date());
  }

  async function saveEmployes(newEmp){
    setSyncStatus("saving");
    const headers=["id","nom","prenom","poste","dept","sal","hm","statut","debut","type"];
    const rows=[headers,...newEmp.map(e=>headers.map(h=>e[h]??""))];
    const ok=await sheetWrite(SHEETS.EMPLOYES,rows);
    setSyncStatus(ok?"ok":"error");setLastSync(new Date());
  }

  async function saveAbsMarega(newAbs){
    setSyncStatus("saving");
    const headers=["id","date","type","note"];
    const rows=[headers,...newAbs.map(a=>headers.map(h=>a[h]??""))];
    const ok=await sheetWrite(SHEETS.ABS_MAREGA,rows);
    setSyncStatus(ok?"ok":"error");setLastSync(new Date());
  }

  async function saveSTInter(newInter){
    setSyncStatus("saving");
    const headers=["interventionId","stId","date","note","ligneId","ligneType","debut","fin","total","jour","nuit","nombre","heures","prix","ligneNote"];
    const rows=[headers];
    newInter.forEach(inter=>{
      if(inter.lignes.length===0){
        rows.push([inter.id,inter.stId,inter.date,inter.note||"","","","","",0,0,0,0,0,0,""]);
      }else{
        inter.lignes.forEach(l=>{
          rows.push([inter.id,inter.stId,inter.date,inter.note||"",l.id,l.type,l.debut||"",l.fin||"",l.total||0,l.jour||0,l.nuit||0,l.nombre||0,l.heures||0,l.prix||0,l.note||""]);
        });
      }
    });
    const ok=await sheetWrite(SHEETS.ST_INTER,rows);
    setSyncStatus(ok?"ok":"error");setLastSync(new Date());
  }

  const ES=(eid,f)=>calcStats(eid,pts,cgs,emp,f);

  // ── ACTIONS ───────────────────────────────────
  function toggleEmpSel(eid){setPF(p=>({...p,empIds:p.empIds.includes(eid)?p.empIds.filter(x=>x!==eid):[...p.empIds,eid]}));}

  async function addP(){
    const{empIds,date,debut,fin,pause,grandDeplacement,frais,fraisNote,note}=pF;
    if(!empIds.length||!date||!debut||!fin)return;
    const h=calcH(debut,fin,Number(pause));if(h.total<=0)return;
    const gd=Number(grandDeplacement)||0,fr=Number(frais)||0;
    const newPts=[...pts,...empIds.map(eid=>({id:`p_${Date.now()}_${eid}`,empId:Number(eid),date,debut,fin,pause:Number(pause),grandDeplacement:gd,frais:fr,fraisNote,note,...h}))];
    setPts(newPts);setShowP(false);setPF(dP);
    await savePointages(newPts);
  }

  async function updateP(id, updates){
    const newPts=pts.map(p=>p.id===id?{...p,...updates}:p);
    setPts(newPts);setEditP(null);await savePointages(newPts);
  }
  async function delP(id){
    const newPts=pts.filter(x=>x.id!==id);setPts(newPts);await savePointages(newPts);
  }

  async function addC(){
    const{empId,type,debut,fin,note}=cF;if(!empId||!debut||!fin)return;
    const jours=jOuv(debut,fin);
    const newCgs=[...cgs,{id:`c_${Date.now()}`,empId:Number(empId),type,debut,fin,jours,note}];
    setCgs(newCgs);setShowC(false);setCF(dC);await saveConges(newCgs);
  }

  async function updateC(id,updates){const newCgs=cgs.map(c=>c.id===id?{...c,...updates}:c);setCgs(newCgs);setEditC(null);await saveConges(newCgs);}
  async function delC(id){const newCgs=cgs.filter(x=>x.id!==id);setCgs(newCgs);await saveConges(newCgs);}

  async function addEmp(){
    const{nom,prenom,poste,dept,sal,hm,statut,debut,type}=empF;if(!nom||!prenom||!sal||!hm)return;
    const newId=Math.max(...emp.map(e=>e.id),0)+1;
    const newEmp=[...emp,{id:newId,nom:nom.toUpperCase(),prenom,poste,dept,sal:Number(sal),hm:Number(hm),statut,debut,type}];
    setEmp(newEmp);setShowAddEmp(false);setEmpF(dEMP);await saveEmployes(newEmp);
  }

  async function addAbsM(){
    if(!amF.date)return;
    const newAbs=[...absMarega,{id:`am_${Date.now()}`,...amF}];
    setAbsMarega(newAbs);setShowAbsM(false);setAMF(dAM);await saveAbsMarega(newAbs);
  }

  async function delAbsM(id){const newAbs=absMarega.filter(x=>x.id!==id);setAbsMarega(newAbs);await saveAbsMarega(newAbs);}

  // Export comptable
  function exportComptable(){
    const[y,m]=vm.split("-").map(Number);const label=`${MOIS[m-1]}_${y}`;
    const rows=[];
    // Section 1 : entête pointages
    rows.push({
      section:"=== POINTAGES SALARIÉS ===",nom:"",prenom:"",poste:"",statut:"",
      contrat_h:"",heures_travail:"",heures_jour:"",heures_nuit:"",
      heures_grand_deplacement:"",heures_sup:"",frais_avances_eur:"",detail_frais:"",
      type_absence:"",date_debut_conge:"",date_fin_conge:"",jours_ouvres:"",note_conge:""
    });
    emp.forEach(e=>{
      const mPts=pts.filter(p=>p.empId===e.id&&mk(p.date)===vm);
      const tH=mPts.reduce((s,p)=>s+(Number(p.total)||0),0);
      const nH=mPts.reduce((s,p)=>s+(Number(p.nuit)||0),0);
      const jH=mPts.reduce((s,p)=>s+(Number(p.jour)||0),0);
      const gdH=mPts.reduce((s,p)=>s+(Number(p.grandDeplacement)||0),0);
      const fraisT=mPts.reduce((s,p)=>s+(Number(p.frais)||0),0);
      const supH=Math.max(0,tH-e.hm);
      const fraisDetails=mPts.filter(p=>Number(p.frais)>0).map(p=>`${fd(p.date)}: ${Number(p.frais).toFixed(2)}€${p.fraisNote?" ("+p.fraisNote+")":""}`).join(" | ");
      // Congés de ce salarié ce mois
      const eCgs=cgs.filter(c=>c.empId===e.id&&(mk(c.debut)===vm||mk(c.fin)===vm));
      const cgsStr=eCgs.map(c=>`${c.type}: ${fd(c.debut)}→${fd(c.fin)} (${c.jours}j)`).join(" | ");
      rows.push({
        section:"POINTAGE",nom:e.nom,prenom:e.prenom,poste:e.poste,statut:e.statut,
        contrat_h:e.hm,heures_travail:tH.toFixed(2),heures_jour:jH.toFixed(2),
        heures_nuit:nH.toFixed(2),heures_grand_deplacement:gdH.toFixed(2),
        heures_sup:supH.toFixed(2),frais_avances_eur:fraisT.toFixed(2),
        detail_frais:fraisDetails,
        type_absence:eCgs.length>0?eCgs.map(c=>c.type).join(" | "):"",
        date_debut_conge:eCgs.length>0?eCgs.map(c=>c.debut).join(" | "):"",
        date_fin_conge:eCgs.length>0?eCgs.map(c=>c.fin).join(" | "):"",
        jours_ouvres:eCgs.length>0?eCgs.reduce((s,c)=>s+(Number(c.jours)||0),0):"",
        note_conge:eCgs.length>0?eCgs.map(c=>c.note||"").join(" | "):""
      });
    });
    // Section 2 : détail congés
    const mCgs=cgs.filter(c=>mk(c.debut)===vm||mk(c.fin)===vm);
    if(mCgs.length>0){
      rows.push({
        section:"=== DÉTAIL CONGÉS & ABSENCES ===",nom:"",prenom:"",poste:"",statut:"",
        contrat_h:"",heures_travail:"",heures_jour:"",heures_nuit:"",
        heures_grand_deplacement:"",heures_sup:"",frais_avances_eur:"",detail_frais:"",
        type_absence:"",date_debut_conge:"",date_fin_conge:"",jours_ouvres:"",note_conge:""
      });
      mCgs.forEach(c=>{
        const e2=emp.find(x=>x.id===c.empId);
        rows.push({
          section:"ABSENCE",nom:e2?.nom||"",prenom:e2?.prenom||"",poste:e2?.poste||"",statut:e2?.statut||"",
          contrat_h:"",heures_travail:"",heures_jour:"",heures_nuit:"",
          heures_grand_deplacement:"",heures_sup:"",frais_avances_eur:"",detail_frais:"",
          type_absence:c.type,date_debut_conge:c.debut,date_fin_conge:c.fin,
          jours_ouvres:c.jours,note_conge:c.note||""
        });
      });
    }
    xCSV(rows,`Phasellus_Comptable_${label}.csv`);
  }

  const TABS=[{k:"dash",l:"🏠 Dashboard"},{k:"pt",l:"⏱ Pointage & Suivi"},{k:"an",l:"📆 Vue Annuelle"},{k:"cg",l:"🌴 Congés"},{k:"st",l:"🔧 Sous-traitants"},{k:"pl",l:"📅 Planning"},{k:"eq",l:"👥 Équipe"}];

  // ── ÉCRAN CHARGEMENT ──────────────────────────
  if(loading)return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:20,background:"#f1f5f9"}}>
    <img src={LOGO} style={{height:80,objectFit:"contain"}}/>
    <div style={{fontSize:"1.5rem",fontWeight:800,color:BL}}>Phasellus Batiment</div>
    <div style={{display:"flex",alignItems:"center",gap:10,color:"#64748b"}}>
      <span className="spin">⟳</span>
      <span>Connexion à Google Sheets…</span>
    </div>
    <div style={{fontSize:"0.8rem",color:"#94a3b8"}}>Chargement des données en cours</div>
  </div>;

  return <div style={{fontFamily:"'Inter',sans-serif",background:"#f1f5f9",minHeight:"100vh"}}>

    {/* HEADER */}
    <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between",height:66,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",position:"sticky",top:0,zIndex:100,gap:10,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <img src={LOGO} style={{height:44,objectFit:"contain"}} alt="Phasellus"/>
        <div style={{borderLeft:"1px solid #e2e8f0",paddingLeft:14}}>
          <div style={{fontSize:"0.63rem",color:"#94a3b8",fontWeight:600,letterSpacing:"1px",textTransform:"uppercase"}}>Gestion du temps · Google Sheets</div>
          <div style={{fontSize:"0.76rem",fontWeight:700,color:BL}}>{emp.length} collaborateurs · CP 2.5j/mois · Nuit +25%</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>

        <span style={{fontSize:"0.66rem",padding:"3px 9px",borderRadius:100,fontWeight:600,
          background:syncStatus==="saving"?"#fef3c7":syncStatus==="ok"?"#dcfce7":syncStatus==="error"?"#fef2f2":"#f1f5f9",

          {syncStatus==="saving"?"⟳ Sauvegarde…":syncStatus==="ok"?`✓ Sync ${lastSync?.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}`:syncStatus==="error"?"✗ Erreur sync":"● Google Sheets"}
        </span>
        <Btn v="g" style={{padding:"5px 12px",fontSize:"0.72rem"}} onClick={loadAll}>↻ Actualiser</Btn>
        <Btn v="s" style={{padding:"5px 12px",fontSize:"0.72rem"}} onClick={exportComptable}>📊 Export Comptable</Btn>
      </div>
    </div>

    {/* NAV */}
    <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",display:"flex",padding:"0 1.5rem",flexWrap:"wrap"}}>
      {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"12px 15px",background:"transparent",border:"none",borderBottom:tab===t.k?"3px solid "+BL:"3px solid transparent",color:tab===t.k?BL:"#64748b",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:"0.78rem",whiteSpace:"nowrap"}}>{t.l}</button>)}
    </div>

    <div style={{maxWidth:1280,margin:"0 auto",padding:"1.5rem"}}>
      {tab==="dash"&&<Dash ES={ES} vm={vm} setVm={setVm} pts={pts} cgs={cgs} emp={emp} stInter={stInter}/>}
      {tab==="pt"&&<Pt pts={pts} pF={pF} setPF={setPF} toggleEmpSel={toggleEmpSel} emp={emp} addP={addP} setShowP={setShowP} showP={showP} delP={delP} setEditP={setEditP} vm={vm} setVm={setVm} showAbsM={showAbsM} setShowAbsM={setShowAbsM} absMarega={absMarega} delAbsM={delAbsM} dP={dP} ES={ES} cgs={cgs}/>}
      {tab==="an"&&<Ann ES={ES} pts={pts} cgs={cgs} vm={vm} setVm={setVm} emp={emp}/>}
      
      {tab==="cg"&&<Cg ES={ES} cgs={cgs} setShowC={setShowC} delC={delC} setEditC={setEditC} emp={emp} pts={pts}/>}
      {tab==="st"&&<STSection stListe={stListe} setStListe={setStListe} stInter={stInter} setStInter={setStInter} saveSTInter={saveSTInter} vm={vm} setVm={setVm}/>}
      {tab==="pl"&&<Planning planning={planning} setPlanning={setPlanning} emp={emp} stListe={stListe}/>}
      {tab==="eq"&&<Eq ES={ES} vm={vm} emp={emp} setShowAddEmp={setShowAddEmp}/>}
    </div>

    {/* MODAL POINTAGE */}
    {showP&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&(setShowP(false),setPF(dP))}>
      <div style={mbox_}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>
          ⏱ Nouveau pointage <Btn v="g" style={{padding:"4px 10px"}} onClick={()=>{setShowP(false);setPF(dP);}}>✕</Btn>
        </div>
        <div style={{marginBottom:"1rem"}}>
          <label style={lbl}>Collaborateurs (sélection multiple)</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6,maxHeight:200,overflowY:"auto",padding:4}}>
            {emp.map(e=>{const sel=pF.empIds.includes(e.id);return <div key={e.id} onClick={()=>toggleEmpSel(e.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,border:`1px solid ${sel?BL:"#e2e8f0"}`,background:sel?BLL:"#fff",cursor:"pointer"}}>
              <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${sel?BL:"#cbd5e1"}`,background:sel?BL:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#fff",fontSize:10}}>✓</span>}</div>
              <div><div style={{fontSize:"0.8rem",fontWeight:600,color:BL}}>{e.nom} {e.prenom}</div><div style={{fontSize:"0.63rem",color:"#94a3b8"}}>{e.poste}</div></div>
            </div>;})}

          {pF.empIds.length>0&&<div style={{marginTop:6,fontSize:"0.72rem",color:"#16a34a",fontWeight:600}}>✓ {pF.empIds.length} sélectionné{pF.empIds.length>1?"s":""}</div>}

        <Row n={2}><F label="Date"><input type="date" style={inp} value={pF.date} onChange={e=>setPF(p=>({...p,date:e.target.value}))}/></F><F label="Pause (min)"><input type="number" style={inp} value={pF.pause} min="0" onChange={e=>setPF(p=>({...p,pause:e.target.value}))}/></F></Row>
        <Row n={2}><F label="Début"><input type="time" style={inp} value={pF.debut} onChange={e=>setPF(p=>({...p,debut:e.target.value}))}/></F><F label="Fin"><input type="time" style={inp} value={pF.fin} onChange={e=>setPF(p=>({...p,fin:e.target.value}))}/></F></Row>
        <F label="⏳ Grand déplacement (h)"><input type="number" style={{...inp,borderColor:"#0369a1",background:"#f0f9ff"}} value={pF.grandDeplacement} min="0" step="0.5" onChange={e=>setPF(p=>({...p,grandDeplacement:e.target.value}))}/></F>
        <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"0.9rem",margin:"0.5rem 0"}}>

          <Row n={2}><F label="Montant (€)"><input type="number" style={{...inp,borderColor:"#d97706"}} value={pF.frais} min="0" step="0.01" onChange={e=>setPF(p=>({...p,frais:e.target.value}))}/></F>

        {pF.debut&&pF.fin&&(()=>{const h=calcH(pF.debut,pF.fin,Number(pF.pause||0));if(h.total<=0)return<AL t="d">⚠ Durée invalide</AL>;
          return<div style={{background:BLL,border:`1px solid ${BL3}`,borderRadius:10,padding:"1rem",margin:"1rem 0"}}>
            <div style={{fontSize:"0.63rem",color:"#94a3b8",fontWeight:700,marginBottom:8}}>APERÇU — {pF.empIds.length||"?"} collaborateur{pF.empIds.length>1?"s":""}</div>
            <div style={{display:"flex",gap:"1.2rem",flexWrap:"wrap"}}>

              <div><div style={{fontSize:"0.6rem",color:"#d97706"}}>☀️ JOUR</div><div style={{color:"#d97706",fontWeight:700}}>{fmt(h.jour)}</div></div>
              <div><div style={{fontSize:"0.6rem",color:"#7c3aed"}}>🌙 NUIT +25%</div><div style={{color:"#7c3aed",fontWeight:700}}>{fmt(h.nuit)}</div></div>
              {Number(pF.frais)>0&&<div style={{background:"#fff7ed",borderRadius:8,padding:"4px 10px"}}><div style={{fontSize:"0.6rem",color:"#d97706"}}>💰 FRAIS</div><div style={{color:"#d97706",fontWeight:700}}>{Number(pF.frais).toFixed(2)}€</div></div>}

          </div>;})()} 
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}>
          <Btn v="g" onClick={()=>{setShowP(false);setPF(dP);}}>Annuler</Btn>
          <Btn v="p" onClick={addP} disabled={syncing}>✔ Enregistrer {pF.empIds.length>1?`(${pF.empIds.length})`:""}</Btn>
        </div>
      </div>

    {/* MODAL CONGÉ */}
    {showC&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&(setShowC(false),setCF(dC))}>
      <div style={mbox_}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>🌴 Poser une absence<Btn v="g" style={{padding:"4px 10px"}} onClick={()=>{setShowC(false);setCF(dC);}}>✕</Btn></div>
        <AL t="i">CP à <b>2.5j par mois complet</b>. Droits insuffisants → <b>Congé sans solde</b>.</AL>
        <Row n={2}>
          <F label="Collaborateur"><select style={inp} value={cF.empId} onChange={e=>setCF(p=>({...p,empId:e.target.value}))}>

          </select></F>
          <F label="Type"><select style={inp} value={cF.type} onChange={e=>setCF(p=>({...p,type:e.target.value}))}>
            <option value="CP">CP — Congés payés</option>
            <option value="Sans solde">⚠ Congé sans solde</option>
            <option value="Maladie">Arrêt maladie</option>

function Dash({ES,vm,setVm,pts,cgs,emp,stInter}){
  let tH=0,tN=0,tS=0,tC=0,tGD=0,tFrais=0;
  emp.forEach(e=>{const s=ES(e.id,{m:vm});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;tGD+=s.gdH;tFrais+=s.fraisT;}});
  const stM=stInter.filter(s=>mk(s.date)===vm);
  const[y,m]=vm.split("-").map(Number);
  return <div>
    <MNav vm={vm} setVm={setVm}/>
    <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
      <SB col={BL} label="Heures pointées" val={fmt(tH)} sub={`contrat: ${fmt(tC)}`}/>
      <SB col="#7c3aed" label="Heures nuit" val={fmt(tN)} sub="+25%"/>
      <SB col="#d97706" label="Heures sup" val={fmt(tS)}/>
      <SB col="#0369a1" label="Grand déplacement" val={fmt(tGD)}/>
      <SB col="#d97706" label="💰 Frais avancés" val={`${tFrais.toFixed(2)}€`} sub="à rembourser"/>
      <SB col="#ea580c" label="Absences" val={cgs.filter(c=>mk(c.debut)===vm||mk(c.fin)===vm).length}/>
    </div>
    <div style={card}>
      <div style={ctit}>Récap équipe — {MOIS[m-1]} {y}</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Collaborateur","Poste","Contrat (proraté)","Heures pointées","Heures restantes","H. Jour","H. Nuit","H. Sup","Frais avancés"].map(h=><th key={h} style={th_}>{h}</th>)}</tr></thead>
          <tbody>{emp.map(e=>{
            const s=ES(e.id,{m:vm});
            const conProrata=heuresProrata(e.hm,e.debut,vm);
            const restant=conProrata-(s?s.tH:0);
            const manque=restant>0;
            return <tr key={e.id} className="trh">
              <td style={td_}><b style={{color:BL}}>{e.nom}</b> <span style={{color:"#64748b"}}>{e.prenom}</span>{e.type==="apprenti"&&<span style={{marginLeft:6,fontSize:"0.65rem",background:"#fef3c7",color:"#92400e",padding:"1px 7px",borderRadius:100,fontWeight:700}}>Apprenti</span>}</td>
              <td style={{...td_,color:"#64748b",fontSize:"0.76rem"}}>{e.poste}</td>
              <td style={{...td_,color:"#1e293b",fontWeight:500}}>{fmt(conProrata)}{conProrata!==e.hm&&<span style={{fontSize:"0.68rem",color:"#94a3b8",display:"block"}}>({fmt(e.hm)}/mois)</span>}</td>
              <td style={{...td_,fontWeight:700,color:BL}}>{s?fmt(s.tH):"0h00"}</td>
              <td style={{...td_,fontWeight:700,color:manque?"#dc2626":BL}}>{manque?`- ${fmt(restant)}`:`+ ${fmt(Math.abs(restant))}`}</td>
              <td style={td_}>{s&&s.jH>0?fmt(s.jH):<span style={{color:"#cbd5e1"}}>—</span>}</td>
              <td style={td_}>{s&&s.nH>0?fmt(s.nH):<span style={{color:"#cbd5e1"}}>—</span>}</td>
              <td style={td_}>{s&&s.supH>0?<span style={{color:"#dc2626",fontWeight:700}}>{fmt(s.supH)}</span>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
              <td style={td_}>{s&&s.fraisT>0?<span style={{fontWeight:600,color:"#1e293b"}}>{s.fraisT.toFixed(2)}€</span>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
            </tr>;})}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

function Ann({ES,pts,cgs,vm,setVm,emp}){
  const[sel,setSel]=useState("all");const[y]=vm.split("-").map(Number);
  const mData=useMemo(()=>Array.from({length:12},(_,i)=>{
    const m2=`${y}-${String(i+1).padStart(2,"0")}`;
    if(sel==="all"){let tH=0,tN=0,tS=0,tC=0;emp.forEach(e=>{const s=calcStats(e.id,pts,cgs,emp,{m:m2});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;}});return{m2,tH,tN,tS,tC,nb:pts.filter(p=>mk(p.date)===m2).length};}
    else{const s=calcStats(Number(sel),pts,cgs,emp,{m:m2});return{m2,tH:s?.tH||0,tN:s?.nH||0,tS:s?.supH||0,tC:s?.con||0,nb:s?.pts.length||0};}
  }),[y,sel,pts,cgs,emp]);
  const aS=useMemo(()=>{const yy=String(y);if(sel==="all"){let tH=0,tN=0,tS=0,tC=0;emp.forEach(e=>{const s=calcStats(e.id,pts,cgs,emp,{y:yy});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;}});return{tH,tN,tS,tC};}else{const s=calcStats(Number(sel),pts,cgs,emp,{y:yy});return{tH:s?.tH||0,tN:s?.nH||0,tS:s?.supH||0,tC:s?.con||0};}},[y,sel,pts,cgs,emp]);
  const maxH=Math.max(...mData.map(d=>d.tH),1);
  return <div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center",marginBottom:"1.2rem"}}>
      <MNav vm={vm} setVm={setVm} yOnly/>
      <select style={{...inp,width:260}} value={sel} onChange={e=>setSel(e.target.value)}><option value="all">Toute l'équipe</option>{emp.map(e=><option key={e.id} value={e.id}>{e.nom} {e.prenom}</option>)}</select>
    </div>
    <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
      <SB col={BL} label={`Total ${y}`} val={fmt(aS.tH)} sub={`contrat: ${fmt(aS.tC)}`}/><SB col="#7c3aed" label="Nuit" val={fmt(aS.tN)}/><SB col="#d97706" label="Sup" val={fmt(aS.tS)}/><SB col={aS.tH-aS.tC>=0?"#16a34a":"#dc2626"} label="Écart" val={(aS.tH-aS.tC>=0?"+":"")+fmt(aS.tH-aS.tC)}/>

    <div style={card}>

      <div style={{display:"flex",gap:4,alignItems:"flex-end",height:140,paddingBottom:"0.8rem"}}>
        {mData.map((d,i)=>{const hp=maxH>0?(d.tH/maxH)*100:0;const np=d.tH>0?(d.tN/d.tH)*100:0;const cur=Number(vm.split("-")[1])===i+1;
          return<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}} onClick={()=>setVm(`${y}-${String(i+1).padStart(2,"0")}`)}>

            <div style={{width:"100%",height:100,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
              <div style={{width:"100%",borderRadius:"4px 4px 0 0",overflow:"hidden",height:`${Math.max(hp,2)}%`,border:cur?`2px solid ${BL}`:"none"}}>
                <div style={{width:"100%",height:`${np}%`,background:"#7c3aed",minHeight:d.tN>0?2:0}}/><div style={{width:"100%",height:`${100-np}%`,background:cur?BL:BL3}}/>
              </div>
            </div>
            <div style={{fontSize:"0.54rem",color:cur?BL:"#94a3b8",fontWeight:cur?700:500}}>{MC[i]}</div>
          </div>;})}

    <div style={card}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>

      <tbody>{mData.map((d,i)=>{const ec=d.tH-d.tC;const cur=Number(vm.split("-")[1])===i+1;

          <td style={{...td_,color:"#7c3aed"}}>{d.tN>0?fmt(d.tN):"—"}</td>
          <td style={td_}>{d.tS>0?<Badge t="sp">{fmt(d.tS)}</Badge>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
          <td style={{...td_,color:"#94a3b8"}}>{fmt(d.tC)}</td>
          <td style={td_}><span style={{color:ec>=0?"#16a34a":"#dc2626",fontWeight:700}}>{ec>=0?"+":""}{fmt(ec)}</span></td>

        <td style={{...td_,color:"#94a3b8"}}>{fmt(aS.tC)}</td>
        <td style={td_}><span style={{color:aS.tH-aS.tC>=0?"#16a34a":"#dc2626",fontWeight:700}}>{fmt(aS.tH-aS.tC)}</span></td>
      </tr></tfoot>
    </table></div></div>
  </div>;
}

function STSection({stListe,setStListe,stInter,setStInter,saveSTInter,vm,setVm}){
  const[activeSTId,setActiveSTId]=useState(stListe[0]?.id||null);
  const[showAddST,setShowAddST]=useState(false);
  const[showEditTarifs,setShowEditTarifs]=useState(null);
  const[tarifF,setTarifF]=useState({tauxJour:'',tauxNuit:'',tauxDeplIdf:'',tauxDeplHidf:''});
  const[showAddInter,setShowAddInter]=useState(false);
  const[showAddLigne,setShowAddLigne]=useState(null);
  const[stForm,setStForm]=useState({nom:"",type:"individuel"});
  const today=new Date();
  const dInter={stId:activeSTId,date:today.toISOString().slice(0,10),note:""};
  const[interF,setInterF]=useState(dInter);
  const dLigne={type:"heure",debut:"",fin:"",nbIdf:"",nbHidf:"",prixMat:"",note:""};
  const[ligneF,setLigneF]=useState(dLigne);

  function addST(){if(!stForm.nom.trim())return;const newId=Math.max(...stListe.map(s=>s.id),0)+1;setStListe(p=>[...p,{id:newId,nom:stForm.nom.toUpperCase(),type:stForm.type}]);setActiveSTId(newId);setShowAddST(false);setStForm({nom:"",type:"individuel"});}
  function addInter(){if(!interF.stId||!interF.date)return;const newId=`i_${Date.now()}`;const newInter=[...stInter,{id:newId,stId:Number(interF.stId),date:interF.date,note:interF.note,lignes:[]}];setStInter(newInter);setShowAddInter(false);setInterF({...dInter,stId:activeSTId});}
  async function addLigne(interId){
    const{type,debut,fin,nbIdf,nbHidf,prixMat,note}=ligneF;let ligne={id:`l_${Date.now()}`,type,note};
    if(type==="heure"){const h=calcH(debut,fin,0);ligne={...ligne,debut,fin,total:h.total,jour:h.jour,nuit:h.nuit};}
    else if(type==="idf"){ligne={...ligne,nombre:Number(nbIdf)||0};}
    else if(type==="hidf"){ligne={...ligne,heures:Number(nbHidf)||0};}
    else if(type==="materiaux"){ligne={...ligne,prix:Number(prixMat)||0};}
    const newInter=stInter.map(i=>i.id===interId?{...i,lignes:[...i.lignes,ligne]}:i);
    setStInter(newInter);setShowAddLigne(null);setLigneF(dLigne);
    await saveSTInter(newInter);
  }
  async function delInter(id){const newInter=stInter.filter(i=>i.id!==id);setStInter(newInter);await saveSTInter(newInter);}
  async function delLigne(interId,ligneId){const newInter=stInter.map(i=>i.id===interId?{...i,lignes:i.lignes.filter(l=>l.id!==ligneId)}:i);setStInter(newInter);await saveSTInter(newInter);}

  const activeST=stListe.find(s=>s.id===activeSTId);
  const interST=stInter.filter(i=>i.stId===activeSTId&&mk(i.date)===vm).sort((a,b)=>new Date(b.date)-new Date(a.date));

  function stStats(stId,month){
    const inters=stInter.filter(i=>i.stId===stId&&mk(i.date)===month);
    let totH=0,totNuit=0,totJour=0,totIdf=0,totHidf=0,totMat=0;
    inters.forEach(i=>{i.lignes.forEach(l=>{
      if(l.type==="heure"){totH+=Number(l.total)||0;totNuit+=Number(l.nuit)||0;totJour+=Number(l.jour)||0;}
      else if(l.type==="idf")totIdf+=Number(l.nombre)||0;
      else if(l.type==="hidf")totHidf+=Number(l.heures)||0;
      else if(l.type==="materiaux")totMat+=Number(l.prix)||0;
    });});
    const st=stListe.find(s=>s.id===stId)||{};
    const mJour=totJour*(st.tauxJour||0);
    const mNuit=totNuit*(st.tauxNuit||0);
    const mIdf=totIdf*(st.tauxDeplIdf||0);
    const mHidf=totHidf*(st.tauxDeplHidf||0);
    const mTotal=mJour+mNuit+mIdf+mHidf+totMat;
    return{totH,totNuit,totJour,totIdf,totHidf,totMat,nbInter:inters.length,mJour,mNuit,mIdf,mHidf,mTotal};
  }

  function exportST(){
    const[y,m]=vm.split("-").map(Number);const label=`${MOIS[m-1]}_${y}`;
    const wb=XLSX.utils.book_new();
    const BL="1e3a6e",BLL="e8eef7",GR="f8fafc",WH="FFFFFF",GR2="64748b";
    
    stListe.forEach(st=>{
      const inters=stInter.filter(i=>i.stId===st.id&&mk(i.date)===vm);
      const wsData=[];
      // En-tête titre
      wsData.push([`${st.nom} — ${MOIS[m-1]} ${y}`, "", "", "", "", "", "", "", "", "", ""]);
      wsData.push([`Tarifs : Jour ${st.tauxJour||0}€/h · Nuit ${st.tauxNuit||0}€/h · Dépl. IDF ${st.tauxDeplIdf||0}€ · Dépl. Hors IDF ${st.tauxDeplHidf||0}€/h`, "", "", "", "", "", "", "", "", "", ""]);
      wsData.push([""]);
      // En-têtes colonnes
      wsData.push(["DATE","INTERVENTION","TYPE","DÉTAIL","H. JOUR","H. NUIT","DÉPL. IDF","DÉPL. HIDF","MATÉRIAUX","MONTANT","NOTE"]);
      
      let totJour=0,totNuit=0,totIdf=0,totHidf=0,totMat=0,totMontant=0;
      
      inters.forEach(inter=>{
        inter.lignes.forEach(l=>{
          let detail="",montant=0;
          if(l.type==="heure"){
            detail=`${l.debut||""}→${l.fin||""} (${fmt(Number(l.total||0))})`;
            montant=((Number(l.jour)||0)*(st.tauxJour||0))+((Number(l.nuit)||0)*(st.tauxNuit||0));
            totJour+=Number(l.jour)||0;totNuit+=Number(l.nuit)||0;
          } else if(l.type==="idf"){
            detail=`${l.nombre||0} déplacement(s)`;
            montant=(Number(l.nombre)||0)*(st.tauxDeplIdf||0);
            totIdf+=Number(l.nombre)||0;
          } else if(l.type==="hidf"){
            detail=`${l.heures||0}h hors IDF`;
            montant=(Number(l.heures)||0)*(st.tauxDeplHidf||0);
            totHidf+=Number(l.heures)||0;
          } else if(l.type==="materiaux"){
            detail=`Fournitures`;
            montant=Number(l.prix)||0;
            totMat+=Number(l.prix)||0;
          }
          totMontant+=montant;
          wsData.push([
            inter.date,inter.note||"",
            l.type==="heure"?"Heures":l.type==="idf"?"Dépl. IDF":l.type==="hidf"?"Dépl. Hors IDF":"Matériaux",
            detail,
            l.type==="heure"?(Number(l.jour)||0).toFixed(2):"",
            l.type==="heure"?(Number(l.nuit)||0).toFixed(2):"",
            l.type==="idf"?(l.nombre||0):"",
            l.type==="hidf"?(l.heures||0):"",
            l.type==="materiaux"?(Number(l.prix)||0).toFixed(2):"",
            montant.toFixed(2)+"€",
            l.note||""
          ]);
        });
      });
      
      wsData.push([""]);
      wsData.push(["TOTAL","","","",totJour.toFixed(2),totNuit.toFixed(2),totIdf,totHidf.toFixed(2),totMat.toFixed(2),totMontant.toFixed(2)+"€",""]);
      
      const ws=XLSX.utils.aoa_to_sheet(wsData);
      // Largeurs colonnes
      ws["!cols"]=[{wch:12},{wch:18},{wch:14},{wch:20},{wch:8},{wch:8},{wch:9},{wch:9},{wch:10},{wch:12},{wch:16}];
      // Fusionner titre
      ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:10}},{s:{r:1,c:0},e:{r:1,c:10}}];
      
      const sheetName=st.nom.substring(0,31);
      XLSX.utils.book_append_sheet(wb,ws,sheetName);
    });
    
    // Feuille récap globale
    const recapData=[
      [`PHASELLUS BATIMENT — SOUS-TRAITANTS ${MOIS[m-1].toUpperCase()} ${y}`],[""],
      ["SOUS-TRAITANT","H. JOUR","H. NUIT","DÉPL. IDF","DÉPL. HIDF","MATÉRIAUX","TOTAL DÛ","TARIF JOUR","TARIF NUIT","TARIF DÉP."]
    ];
    let grandTotal=0;
    stListe.forEach(st=>{
      const s=stInter.filter(i=>i.stId===st.id&&mk(i.date)===vm);
      let tJ=0,tN=0,tI=0,tH=0,tM=0;
      s.forEach(i=>i.lignes.forEach(l=>{
        if(l.type==="heure"){tJ+=Number(l.jour)||0;tN+=Number(l.nuit)||0;}
        else if(l.type==="idf")tI+=Number(l.nombre)||0;
        else if(l.type==="hidf")tH+=Number(l.heures)||0;
        else if(l.type==="materiaux")tM+=Number(l.prix)||0;
      }));
      const total=tJ*(st.tauxJour||0)+tN*(st.tauxNuit||0)+tI*(st.tauxDeplIdf||0)+tH*(st.tauxDeplHidf||0)+tM;
      grandTotal+=total;
      recapData.push([st.nom,tJ.toFixed(2),tN.toFixed(2),tI,tH.toFixed(2),tM.toFixed(2),total.toFixed(2)+"€",`${st.tauxJour||0}€`,`${st.tauxNuit||0}€`,`${st.tauxDeplIdf||0}€`]);
    });
    recapData.push(["TOTAL GÉNÉRAL","","","","","",grandTotal.toFixed(2)+"€","","",""]);
    
    const wsRecap=XLSX.utils.aoa_to_sheet(recapData);
    wsRecap["!cols"]=[{wch:20},{wch:9},{wch:9},{wch:9},{wch:9},{wch:10},{wch:12},{wch:10},{wch:10},{wch:10}];
    wsRecap["!merges"]=[{s:{r:0,c:0},e:{r:0,c:9}}];
    XLSX.utils.book_append_sheet(wb,wsRecap,"Récapitulatif",true);
    
    if(stInter.filter(i=>mk(i.date)===vm).length===0){alert("Aucune intervention ce mois.");return;}
    XLSX.writeFile(wb,`Phasellus_SousTraitants_${label}.xlsx`);
  }

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:"1rem"}}>
      <h2 style={{fontWeight:800,fontSize:"1.05rem",color:BL}}>🔧 Sous-traitants</h2>
      <div style={{display:"flex",gap:8}}><Btn v="s" style={{fontSize:"0.76rem"}} onClick={exportST}>📊 Export ST</Btn><Btn v="g" style={{fontSize:"0.76rem"}} onClick={()=>setShowAddST(true)}>👤 Nouveau ST</Btn></div>
    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:"12px 12px 0 0",display:"flex",flexWrap:"wrap",overflowX:"auto"}}>
      {stListe.map(st=><button key={st.id} onClick={()=>setActiveSTId(st.id)} style={{padding:"10px 18px",background:"transparent",border:"none",borderBottom:activeSTId===st.id?"3px solid "+BL:"3px solid transparent",color:activeSTId===st.id?BL:"#64748b",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:"0.8rem",whiteSpace:"nowrap",cursor:"pointer"}}>{st.nom}</button>)}
    </div>
    {activeST&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 12px 12px",padding:"1.5rem",marginBottom:"1.2rem"}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        <MNav vm={vm} setVm={setVm}/>
        <Btn v="p" style={{fontSize:"0.78rem"}} onClick={()=>{setInterF({...dInter,stId:activeSTId});setShowAddInter(true);}}>✚ Nouvelle intervention</Btn>
        <Btn v="g" style={{fontSize:"0.76rem"}} onClick={()=>setShowEditTarifs(activeSTId)}>Modifier tarifs</Btn>
      </div>
      {(()=>{const s=stStats(activeSTId,vm);const st2=stListe.find(x=>x.id===activeSTId)||{};return <div>
        <div style={{display:"flex",gap:"0.8rem",flexWrap:"wrap",marginBottom:"0.8rem"}}>
          <SB col={BL} label="Interventions" val={s.nbInter}/>
          <SB col={BL} label="H. Jour" val={fmt(s.totJour)} sub={`${st2.tauxJour||0}€/h`}/>
          <SB col={BL} label="H. Nuit" val={fmt(s.totNuit)} sub={`${st2.tauxNuit||0}€/h`}/>
          <SB col={BL} label="Dépl. IDF" val={`${s.totIdf}`} sub={`${st2.tauxDeplIdf||0}€/dép.`}/>
          <SB col={BL} label="Dépl. Hors IDF" val={`${s.totHidf}h`} sub={`${st2.tauxDeplHidf||0}€/h`}/>
          <SB col={BL} label="Matériaux" val={`${s.totMat.toLocaleString("fr-FR")}€`}/>
          <SB col="#16a34a" label="💰 TOTAL DÛ" val={`${(s.mTotal||0).toLocaleString("fr-FR",{minimumFractionDigits:2})}€`} sub="ce mois"/>
        </div>
      </div>;})()} TYPE html>

async function sheetRead(sheetName){
  try{

    if(!r.ok)return[];
    const d=await r.json();

  }catch{return[];}
}

async function sheetWrite(sheetName,values){
  try{

      headers:{"Content-Type":"text/plain"},

}

// Convertir tableau Google Sheets → objets
function rowsToObjects(rows){
  if(!rows||rows.length<2)return[];
  const headers=rows[0];
  return rows.slice(1).map(row=>Object.fromEntries(headers.map((h,i)=>[h,row[i]||""])));
}

function pmn(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function calcH(d,f,p=0){
  if(!d||!f)return{total:0,jour:0,nuit:0};
  let dm=pmn(d),fm=pmn(f);if(fm<=dm)fm+=1440;
  const tot=fm-dm-p;if(tot<=0)return{total:0,jour:0,nuit:0};
  let nuit=0;for(let i=dm;i<dm+tot;i++){const x=i%1440;if(x>=1260||x<360)nuit++;}
  return{total:tot/60,jour:(tot-nuit)/60,nuit:nuit/60};
}
function fmt(h){if(!h||isNaN(h))return"0h00";const s=h<0?"-":"";const a=Math.abs(h);return`${s}${Math.floor(a)}h${Math.round((a-Math.floor(a))*60).toString().padStart(2,"0")}`;}
function fd(d){if(!d)return"—";return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function mk(d){return d?d.slice(0,7):"";}
function yk(d){return d?d.slice(0,4):"";}
function jOuv(d1,d2){if(!d1||!d2)return 0;let d=new Date(d1+"T12:00:00"),e=new Date(d2+"T12:00:00"),c=0;while(d<=e){if(d.getDay()!==0&&d.getDay()!==6)c++;d.setDate(d.getDate()+1);}return c;}
function heuresProrata(hm, debutStr, moisStr) {
  // Si le mois en cours est le mois de début, proratiser
  if (!debutStr || !moisStr) return hm;
  const debutMois = debutStr.slice(0,7);
  if (debutMois !== moisStr) return hm;
  // Calculer jours ouvrés du mois
  const [y,m] = moisStr.split('-').map(Number);
  const debut = new Date(debutStr + 'T12:00:00');
  const finMois = new Date(y, m, 0); // dernier jour du mois
  let totalOuvres = 0, depuisDebut = 0;
  let d = new Date(y, m-1, 1);
  while (d <= finMois) {
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      totalOuvres++;
      if (d >= debut) depuisDebut++;
    }
    d.setDate(d.getDate() + 1);
  }
  if (totalOuvres === 0) return hm;
  return Math.round((hm * depuisDebut / totalOuvres) * 100) / 100;
}

function cpAcquis(debutStr){
  if(!debutStr)return 0;const debut=new Date(debutStr+"T12:00:00");const now=new Date();if(debut>now)return 0;
  let mois=0,d=new Date(debut);while(true){const next=new Date(d);next.setMonth(next.getMonth()+1);if(next>now)break;mois++;d=next;}
  return Math.round(mois*2.5*10)/10;
}

function xCSV(data,fn){
  if(!data||!data.length)return;
  const h=Object.keys(data[0]);
  const rows=[h.join(";"),...data.map(r=>h.map(k=>{const v=r[k];return typeof v==="string"&&(v.includes(";")||v.includes("\n"))?`"${v}"`:v??"";}).join(";"))];
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8"}));a.download=fn;a.click();
}

function calcStats(eid,pts,cgs,emp,filt){
  const e=emp.find(x=>x.id===eid);if(!e)return null;
  const p=pts.filter(p=>{
    if(p.empId!==eid)return false;
    if(!filt)return true;
    if(filt.m)return mk(p.date)===filt.m;
    if(filt.y)return yk(p.date)===filt.y;
    return true;
  });
  const tH=p.reduce((s,x)=>s+(Number(x.total)||0),0);
  const nH=p.reduce((s,x)=>s+(Number(x.nuit)||0),0);
  const jH=p.reduce((s,x)=>s+(Number(x.jour)||0),0);
  const gdH=p.reduce((s,x)=>s+(Number(x.grandDeplacement)||0),0);
  const fraisT=p.reduce((s,x)=>s+(Number(x.frais)||0),0);
  let con=e.hm;if(filt?.y)con=e.hm*12;
  const supH=Math.max(0,tH-con),manH=Math.max(0,con-tH);
  const acq=cpAcquis(e.debut);
  const cpP=cgs.filter(c=>c.empId===eid&&c.type==="CP").reduce((s,c)=>s+(Number(c.jours)||0),0);
  const mlP=cgs.filter(c=>c.empId===eid&&(c.type==="Maladie"||c.type==="Absence CFA")).reduce((s,c)=>s+(Number(c.jours)||0),0);
  const ssP=cgs.filter(c=>c.empId===eid&&c.type==="Sans solde").reduce((s,c)=>s+(Number(c.jours)||0),0);
  return{tH,nH,jH,gdH,fraisT,supH,manH,con,acq,sCP:Math.max(0,acq-cpP),cpP,mlP,ssP,pts:p,e};
}

    const newPts=pts.filter(x=>x.id!==id);setPts(newPts);await savePointages(newPts);
  }

  async function addC(){
    const{empId,type,debut,fin,note}=cF;if(!empId||!debut||!fin)return;
    const jours=jOuv(debut,fin);
    const newCgs=[...cgs,{id:`c_${Date.now()}`,empId:Number(empId),type,debut,fin,jours,note}];
    setCgs(newCgs);setShowC(false);setCF(dC);await saveConges(newCgs);
  }

  async function updateC(id,updates){const newCgs=cgs.map(c=>c.id===id?{...c,...updates}:c);setCgs(newCgs);setEditC(null);await saveConges(newCgs);}
  async function delC(id){const newCgs=cgs.filter(x=>x.id!==id);setCgs(newCgs);await saveConges(newCgs);}

  async function addEmp(){
    const{nom,prenom,poste,dept,sal,hm,statut,debut,type}=empF;if(!nom||!prenom||!sal||!hm)return;
    const newId=Math.max(...emp.map(e=>e.id),0)+1;
    const newEmp=[...emp,{id:newId,nom:nom.toUpperCase(),prenom,poste,dept,sal:Number(sal),hm:Number(hm),statut,debut,type}];
    setEmp(newEmp);setShowAddEmp(false);setEmpF(dEMP);await saveEmployes(newEmp);
  }

  async function addAbsM(){
    if(!amF.date)return;
    const newAbs=[...absMarega,{id:`am_${Date.now()}`,...amF}];
    setAbsMarega(newAbs);setShowAbsM(false);setAMF(dAM);await saveAbsMarega(newAbs);
  }

  async function delAbsM(id){const newAbs=absMarega.filter(x=>x.id!==id);setAbsMarega(newAbs);await saveAbsMarega(newAbs);}

  // Export comptable
  function exportComptable(){
    const[y,m]=vm.split("-").map(Number);const label=`${MOIS[m-1]}_${y}`;
    const rows=[];
    // Section 1 : entête pointages
    rows.push({
      section:"=== POINTAGES SALARIÉS ===",nom:"",prenom:"",poste:"",statut:"",
      contrat_h:"",heures_travail:"",heures_jour:"",heures_nuit:"",
      heures_grand_deplacement:"",heures_sup:"",frais_avances_eur:"",detail_frais:"",
      type_absence:"",date_debut_conge:"",date_fin_conge:"",jours_ouvres:"",note_conge:""
    });
    emp.forEach(e=>{
      const mPts=pts.filter(p=>p.empId===e.id&&mk(p.date)===vm);
      const tH=mPts.reduce((s,p)=>s+(Number(p.total)||0),0);
      const nH=mPts.reduce((s,p)=>s+(Number(p.nuit)||0),0);
      const jH=mPts.reduce((s,p)=>s+(Number(p.jour)||0),0);
      const gdH=mPts.reduce((s,p)=>s+(Number(p.grandDeplacement)||0),0);
      const fraisT=mPts.reduce((s,p)=>s+(Number(p.frais)||0),0);
      const supH=Math.max(0,tH-e.hm);
      const fraisDetails=mPts.filter(p=>Number(p.frais)>0).map(p=>`${fd(p.date)}: ${Number(p.frais).toFixed(2)}€${p.fraisNote?" ("+p.fraisNote+")":""}`).join(" | ");
      // Congés de ce salarié ce mois
      const eCgs=cgs.filter(c=>c.empId===e.id&&(mk(c.debut)===vm||mk(c.fin)===vm));
      const cgsStr=eCgs.map(c=>`${c.type}: ${fd(c.debut)}→${fd(c.fin)} (${c.jours}j)`).join(" | ");
      rows.push({
        section:"POINTAGE",nom:e.nom,prenom:e.prenom,poste:e.poste,statut:e.statut,
        contrat_h:e.hm,heures_travail:tH.toFixed(2),heures_jour:jH.toFixed(2),
        heures_nuit:nH.toFixed(2),heures_grand_deplacement:gdH.toFixed(2),
        heures_sup:supH.toFixed(2),frais_avances_eur:fraisT.toFixed(2),
        detail_frais:fraisDetails,
        type_absence:eCgs.length>0?eCgs.map(c=>c.type).join(" | "):"",
        date_debut_conge:eCgs.length>0?eCgs.map(c=>c.debut).join(" | "):"",
        date_fin_conge:eCgs.length>0?eCgs.map(c=>c.fin).join(" | "):"",
        jours_ouvres:eCgs.length>0?eCgs.reduce((s,c)=>s+(Number(c.jours)||0),0):"",
        note_conge:eCgs.length>0?eCgs.map(c=>c.note||"").join(" | "):""
      });
    });
    // Section 2 : détail congés
    const mCgs=cgs.filter(c=>mk(c.debut)===vm||mk(c.fin)===vm);
    if(mCgs.length>0){
      rows.push({
        section:"=== DÉTAIL CONGÉS & ABSENCES ===",nom:"",prenom:"",poste:"",statut:"",
        contrat_h:"",heures_travail:"",heures_jour:"",heures_nuit:"",
        heures_grand_deplacement:"",heures_sup:"",frais_avances_eur:"",detail_frais:"",
        type_absence:"",date_debut_conge:"",date_fin_conge:"",jours_ouvres:"",note_conge:""
      });
      mCgs.forEach(c=>{
        const e2=emp.find(x=>x.id===c.empId);
        rows.push({
          section:"ABSENCE",nom:e2?.nom||"",prenom:e2?.prenom||"",poste:e2?.poste||"",statut:e2?.statut||"",
          contrat_h:"",heures_travail:"",heures_jour:"",heures_nuit:"",
          heures_grand_deplacement:"",heures_sup:"",frais_avances_eur:"",detail_frais:"",
          type_absence:c.type,date_debut_conge:c.debut,date_fin_conge:c.fin,
          jours_ouvres:c.jours,note_conge:c.note||""
        });
      });
    }
    xCSV(rows,`Phasellus_Comptable_${label}.csv`);
  }

  const TABS=[{k:"dash",l:"🏠 Dashboard"},{k:"pt",l:"⏱ Pointage & Suivi"},{k:"an",l:"📆 Vue Annuelle"},{k:"cg",l:"🌴 Congés"},{k:"st",l:"🔧 Sous-traitants"},{k:"pl",l:"📅 Planning"},{k:"eq",l:"👥 Équipe"}];

  // ── ÉCRAN CHARGEMENT ──────────────────────────
  if(loading)return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:20,background:"#f1f5f9"}}>
    <img src={LOGO} style={{height:80,objectFit:"contain"}}/>
    <div style={{fontSize:"1.5rem",fontWeight:800,color:BL}}>Phasellus Batiment</div>
    <div style={{display:"flex",alignItems:"center",gap:10,color:"#64748b"}}>
      <span className="spin">⟳</span>
      <span>Connexion à Google Sheets…</span>
    </div>
    <div style={{fontSize:"0.8rem",color:"#94a3b8"}}>Chargement des données en cours</div>
  </div>;

  return <div style={{fontFamily:"'Inter',sans-serif",background:"#f1f5f9",minHeight:"100vh"}}>

    {/* HEADER */}
    <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between",height:66,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",position:"sticky",top:0,zIndex:100,gap:10,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <img src={LOGO} style={{height:44,objectFit:"contain"}} alt="Phasellus"/>
        <div style={{borderLeft:"1px solid #e2e8f0",paddingLeft:14}}>
          <div style={{fontSize:"0.63rem",color:"#94a3b8",fontWeight:600,letterSpacing:"1px",textTransform:"uppercase"}}>Gestion du temps · Google Sheets</div>
          <div style={{fontSize:"0.76rem",fontWeight:700,color:BL}}>{emp.length} collaborateurs · CP 2.5j/mois · Nuit +25%</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        {/* Statut sync */}
        <span style={{fontSize:"0.66rem",padding:"3px 9px",borderRadius:100,fontWeight:600,
          background:syncStatus==="saving"?"#fef3c7":syncStatus==="ok"?"#dcfce7":syncStatus==="error"?"#fef2f2":"#f1f5f9",
          color:syncStatus==="saving"?"#d97706":syncStatus==="ok"?"#16a34a":syncStatus==="error"?"#dc2626":"#94a3b8"}}>
          {syncStatus==="saving"?"⟳ Sauvegarde…":syncStatus==="ok"?`✓ Sync ${lastSync?.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}`:syncStatus==="error"?"✗ Erreur sync":"● Google Sheets"}
        </span>
        <Btn v="g" style={{padding:"5px 12px",fontSize:"0.72rem"}} onClick={loadAll}>↻ Actualiser</Btn>
        <Btn v="s" style={{padding:"5px 12px",fontSize:"0.72rem"}} onClick={exportComptable}>📊 Export Comptable</Btn>
      </div>
    </div>

    {/* NAV */}
    <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",display:"flex",padding:"0 1.5rem",flexWrap:"wrap"}}>
      {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"12px 15px",background:"transparent",border:"none",borderBottom:tab===t.k?"3px solid "+BL:"3px solid transparent",color:tab===t.k?BL:"#64748b",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:"0.78rem",whiteSpace:"nowrap"}}>{t.l}</button>)}
    </div>

    <div style={{maxWidth:1280,margin:"0 auto",padding:"1.5rem"}}>
      {tab==="dash"&&<Dash ES={ES} vm={vm} setVm={setVm} pts={pts} cgs={cgs} emp={emp} stInter={stInter}/>}
      {tab==="pt"&&<Pt pts={pts} pF={pF} setPF={setPF} toggleEmpSel={toggleEmpSel} emp={emp} addP={addP} setShowP={setShowP} showP={showP} delP={delP} setEditP={setEditP} vm={vm} setVm={setVm} showAbsM={showAbsM} setShowAbsM={setShowAbsM} absMarega={absMarega} delAbsM={delAbsM} dP={dP} ES={ES} cgs={cgs}/>}
      {tab==="an"&&<Ann ES={ES} pts={pts} cgs={cgs} vm={vm} setVm={setVm} emp={emp}/>}
      
      {tab==="cg"&&<Cg ES={ES} cgs={cgs} setShowC={setShowC} delC={delC} setEditC={setEditC} emp={emp} pts={pts}/>}
      {tab==="st"&&<STSection stListe={stListe} setStListe={setStListe} stInter={stInter} setStInter={setStInter} saveSTInter={saveSTInter} vm={vm} setVm={setVm}/>}
      {tab==="pl"&&<Planning planning={planning} setPlanning={setPlanning} emp={emp} stListe={stListe}/>}
      {tab==="eq"&&<Eq ES={ES} vm={vm} emp={emp} setShowAddEmp={setShowAddEmp}/>}
    </div>

    {/* MODAL POINTAGE */}
    {showP&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&(setShowP(false),setPF(dP))}>
      <div style={mbox_}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>
          ⏱ Nouveau pointage <Btn v="g" style={{padding:"4px 10px"}} onClick={()=>{setShowP(false);setPF(dP);}}>✕</Btn>
        </div>
        <div style={{marginBottom:"1rem"}}>
          <label style={lbl}>Collaborateurs (sélection multiple)</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6,maxHeight:200,overflowY:"auto",padding:4}}>
            {emp.map(e=>{const sel=pF.empIds.includes(e.id);return <div key={e.id} onClick={()=>toggleEmpSel(e.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,border:`1px solid ${sel?BL:"#e2e8f0"}`,background:sel?BLL:"#fff",cursor:"pointer"}}>
              <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${sel?BL:"#cbd5e1"}`,background:sel?BL:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#fff",fontSize:10}}>✓</span>}</div>
              <div><div style={{fontSize:"0.8rem",fontWeight:600,color:BL}}>{e.nom} {e.prenom}</div><div style={{fontSize:"0.63rem",color:"#94a3b8"}}>{e.poste}</div></div>
            </div>;})}
          </div>
          {pF.empIds.length>0&&<div style={{marginTop:6,fontSize:"0.72rem",color:"#16a34a",fontWeight:600}}>✓ {pF.empIds.length} sélectionné{pF.empIds.length>1?"s":""}</div>}
        </div>
        <Row n={2}><F label="Date"><input type="date" style={inp} value={pF.date} onChange={e=>setPF(p=>({...p,date:e.target.value}))}/></F><F label="Pause (min)"><input type="number" style={inp} value={pF.pause} min="0" onChange={e=>setPF(p=>({...p,pause:e.target.value}))}/></F></Row>
        <Row n={2}><F label="Début"><input type="time" style={inp} value={pF.debut} onChange={e=>setPF(p=>({...p,debut:e.target.value}))}/></F><F label="Fin"><input type="time" style={inp} value={pF.fin} onChange={e=>setPF(p=>({...p,fin:e.target.value}))}/></F></Row>
        <F label="⏳ Grand déplacement (h)"><input type="number" style={{...inp,borderColor:"#0369a1",background:"#f0f9ff"}} value={pF.grandDeplacement} min="0" step="0.5" onChange={e=>setPF(p=>({...p,grandDeplacement:e.target.value}))}/></F>
        <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"0.9rem",margin:"0.5rem 0"}}>
          <div style={{fontSize:"0.68rem",fontWeight:700,color:"#d97706",letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>💰 Frais avancés</div>
          <Row n={2}><F label="Montant (€)"><input type="number" style={{...inp,borderColor:"#d97706"}} value={pF.frais} min="0" step="0.01" onChange={e=>setPF(p=>({...p,frais:e.target.value}))}/></F>
          <F label="Nature des frais"><input type="text" style={inp} value={pF.fraisNote} placeholder="carburant, repas, péage…" onChange={e=>setPF(p=>({...p,fraisNote:e.target.value}))}/></F></Row>
        </div>
        <F label="Note / Chantier"><input type="text" style={inp} value={pF.note} placeholder="Chantier, intervention…" onChange={e=>setPF(p=>({...p,note:e.target.value}))}/></F>
        {pF.debut&&pF.fin&&(()=>{const h=calcH(pF.debut,pF.fin,Number(pF.pause||0));if(h.total<=0)return<AL t="d">⚠ Durée invalide</AL>;
          return<div style={{background:BLL,border:`1px solid ${BL3}`,borderRadius:10,padding:"1rem",margin:"1rem 0"}}>
            <div style={{fontSize:"0.63rem",color:"#94a3b8",fontWeight:700,marginBottom:8}}>APERÇU — {pF.empIds.length||"?"} collaborateur{pF.empIds.length>1?"s":""}</div>
            <div style={{display:"flex",gap:"1.2rem",flexWrap:"wrap"}}>
              <div><div style={{fontSize:"0.6rem",color:"#94a3b8"}}>TRAVAIL</div><div style={{color:BL,fontWeight:800,fontSize:"1.1rem"}}>{fmt(h.total)}</div></div>
              <div><div style={{fontSize:"0.6rem",color:"#d97706"}}>☀️ JOUR</div><div style={{color:"#d97706",fontWeight:700}}>{fmt(h.jour)}</div></div>
              <div><div style={{fontSize:"0.6rem",color:"#7c3aed"}}>🌙 NUIT +25%</div><div style={{color:"#7c3aed",fontWeight:700}}>{fmt(h.nuit)}</div></div>
              {Number(pF.frais)>0&&<div style={{background:"#fff7ed",borderRadius:8,padding:"4px 10px"}}><div style={{fontSize:"0.6rem",color:"#d97706"}}>💰 FRAIS</div><div style={{color:"#d97706",fontWeight:700}}>{Number(pF.frais).toFixed(2)}€</div></div>}
            </div>
            {h.nuit>0&&<div style={{marginTop:8,padding:"6px 10px",background:"#ede9fe",borderRadius:6,fontSize:"0.74rem",color:"#6d28d9"}}>🌙 Heures nuit détectées — +25% appliqué</div>}
          </div>;})()} 
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}>
          <Btn v="g" onClick={()=>{setShowP(false);setPF(dP);}}>Annuler</Btn>
          <Btn v="p" onClick={addP} disabled={syncing}>✔ Enregistrer {pF.empIds.length>1?`(${pF.empIds.length})`:""}</Btn>
        </div>
      </div>
    </div>}

    {/* MODAL CONGÉ */}
    {showC&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&(setShowC(false),setCF(dC))}>
      <div style={mbox_}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>🌴 Poser une absence<Btn v="g" style={{padding:"4px 10px"}} onClick={()=>{setShowC(false);setCF(dC);}}>✕</Btn></div>
        <AL t="i">CP à <b>2.5j par mois complet</b>. Droits insuffisants → <b>Congé sans solde</b>.</AL>
        <Row n={2}>
          <F label="Collaborateur"><select style={inp} value={cF.empId} onChange={e=>setCF(p=>({...p,empId:e.target.value}))}>
            <option value="">Sélectionner…</option>
            {emp.map(e=>{const acq=cpAcquis(e.debut);const s=calcStats(e.id,pts,cgs,emp,null);const r=s?s.sCP:acq;return<option key={e.id} value={e.id}>{e.nom} {e.prenom} — CP: {r.toFixed(1)}j</option>;})}
          </select></F>
          <F label="Type"><select style={inp} value={cF.type} onChange={e=>setCF(p=>({...p,type:e.target.value}))}>
            <option value="CP">CP — Congés payés</option>
            <option value="Sans solde">⚠ Congé sans solde</option>
            <option value="Maladie">Arrêt maladie</option>
            <option value="Formation">Formation</option>
            <option value="Absence CFA">Absence CFA (Marega)</option>
            <option value="Autre">Autre</option>
          </select></F>
        </Row>
        {cF.type==="Sans solde"&&<AL t="w">⚠ Droits CP insuffisants. Mention visible sur export comptable.</AL>}
        <Row n={2}><F label="Début"><input type="date" style={inp} value={cF.debut} onChange={e=>setCF(p=>({...p,debut:e.target.value}))}/></F><F label="Fin"><input type="date" style={inp} value={cF.fin} onChange={e=>setCF(p=>({...p,fin:e.target.value}))}/></F></Row>
        <F label="Note"><input type="text" style={inp} value={cF.note} onChange={e=>setCF(p=>({...p,note:e.target.value}))}/></F>
        {cF.debut&&cF.fin&&(()=>{const j=jOuv(cF.debut,cF.fin);return j>0?<AL t="s">📅 {j} jour{j>1?"s":""} ouvré{j>1?"s":""}</AL>:null;})()}
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={()=>{setShowC(false);setCF(dC);}}>Annuler</Btn><Btn v="p" onClick={addC}>✔ Enregistrer</Btn></div>
      </div>
    </div>}

    {/* MODAL ABSENCE MAREGA */}
    {showAbsM&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&(setShowAbsM(false),setAMF(dAM))}>
      <div style={{...mbox_,maxWidth:420}}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.2rem",color:BL}}>📋 Absence Marega (CFA)</div>
        <F label="Date"><input type="date" style={inp} value={amF.date} onChange={e=>setAMF(p=>({...p,date:e.target.value}))}/></F>
        <div style={{marginBottom:"0.8rem"}}><F label="Type"><select style={inp} value={amF.type} onChange={e=>setAMF(p=>({...p,type:e.target.value}))}>
          <option value="Absence">Absence injustifiée</option><option value="Retard">Retard</option><option value="Maladie">Maladie</option><option value="Autre">Autre</option>
        </select></F></div>
        <F label="Note"><input type="text" style={inp} value={amF.note} onChange={e=>setAMF(p=>({...p,note:e.target.value}))}/></F>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={()=>{setShowAbsM(false);setAMF(dAM);}}>Annuler</Btn><Btn v="p" onClick={addAbsM}>✔ Enregistrer</Btn></div>
      </div>
    </div>}

    {/* MODAL AJOUT SALARIÉ */}
    {showAddEmp&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&(setShowAddEmp(false),setEmpF(dEMP))}>
      <div style={mbox_}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>👤 Ajouter un collaborateur<Btn v="g" style={{padding:"4px 10px"}} onClick={()=>{setShowAddEmp(false);setEmpF(dEMP);}}>✕</Btn></div>
        <Row n={2}><F label="Nom"><input type="text" style={inp} value={empF.nom} onChange={e=>setEmpF(p=>({...p,nom:e.target.value.toUpperCase()}))}/></F><F label="Prénom"><input type="text" style={inp} value={empF.prenom} onChange={e=>setEmpF(p=>({...p,prenom:e.target.value}))}/></F></Row>
        <Row n={2}><F label="Poste"><input type="text" style={inp} value={empF.poste} onChange={e=>setEmpF(p=>({...p,poste:e.target.value}))}/></F>
        <F label="Département"><select style={inp} value={empF.dept} onChange={e=>setEmpF(p=>({...p,dept:e.target.value}))}>{[...new Set(emp.map(e=>e.dept))].map(d=><option key={d} value={d}>{d}</option>)}</select></F></Row>
        <Row n={3}><F label="Salaire brut (€)"><input type="number" style={inp} value={empF.sal} onChange={e=>setEmpF(p=>({...p,sal:e.target.value}))}/></F><F label="Heures/mois"><input type="number" style={inp} value={empF.hm} onChange={e=>setEmpF(p=>({...p,hm:e.target.value}))}/></F>
        <F label="Contrat"><select style={inp} value={empF.statut} onChange={e=>setEmpF(p=>({...p,statut:e.target.value}))}><option value="CDI">CDI</option><option value="CDD">CDD</option><option value="Intérim">Intérim</option></select></F></Row>
        <Row n={2}><F label="Date recrutement"><input type="date" style={inp} value={empF.debut} onChange={e=>setEmpF(p=>({...p,debut:e.target.value}))}/></F>
        <F label="Profil"><select style={inp} value={empF.type} onChange={e=>setEmpF(p=>({...p,type:e.target.value}))}><option value="normal">Salarié normal</option><option value="apprenti">Apprenti (CFA)</option></select></F></Row>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={()=>{setShowAddEmp(false);setEmpF(dEMP);}}>Annuler</Btn><Btn v="p" onClick={addEmp}>✔ Ajouter</Btn></div>
      </div>
    </div>}
  </div>;
}

// DASHBOARD
// ══════════════════════════════════════════════
function Dash({ES,vm,setVm,pts,cgs,emp,stInter}){
  let tH=0,tN=0,tS=0,tC=0,tGD=0,tFrais=0;
  emp.forEach(e=>{const s=ES(e.id,{m:vm});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;tGD+=s.gdH;tFrais+=s.fraisT;}});
  const stM=stInter.filter(s=>mk(s.date)===vm);
  const[y,m]=vm.split("-").map(Number);
  return <div>
    <MNav vm={vm} setVm={setVm}/>
    <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
      <SB col={BL} label="Heures pointées" val={fmt(tH)} sub={`contrat: ${fmt(tC)}`}/>
      <SB col="#7c3aed" label="Heures nuit" val={fmt(tN)} sub="+25%"/>
      <SB col="#d97706" label="Heures sup" val={fmt(tS)}/>
      <SB col="#0369a1" label="Grand déplacement" val={fmt(tGD)}/>
      <SB col="#d97706" label="💰 Frais avancés" val={`${tFrais.toFixed(2)}€`} sub="à rembourser"/>
      <SB col="#ea580c" label="Absences" val={cgs.filter(c=>mk(c.debut)===vm||mk(c.fin)===vm).length}/>
    </div>
    <div style={card}>
      <div style={ctit}>Récap équipe — {MOIS[m-1]} {y}</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Collaborateur","Poste","Contrat (proraté)","Heures pointées","Heures restantes","H. Jour","H. Nuit","H. Sup","Frais avancés"].map(h=><th key={h} style={th_}>{h}</th>)}</tr></thead>
          <tbody>{emp.map(e=>{
            const s=ES(e.id,{m:vm});
            const conProrata=heuresProrata(e.hm,e.debut,vm);
            const restant=conProrata-(s?s.tH:0);
            const manque=restant>0;
            return <tr key={e.id} className="trh">
              <td style={td_}><b style={{color:BL}}>{e.nom}</b> <span style={{color:"#64748b"}}>{e.prenom}</span>{e.type==="apprenti"&&<span style={{marginLeft:6,fontSize:"0.65rem",background:"#fef3c7",color:"#92400e",padding:"1px 7px",borderRadius:100,fontWeight:700}}>Apprenti</span>}</td>
              <td style={{...td_,color:"#64748b",fontSize:"0.76rem"}}>{e.poste}</td>
              <td style={{...td_,color:"#1e293b",fontWeight:500}}>{fmt(conProrata)}{conProrata!==e.hm&&<span style={{fontSize:"0.68rem",color:"#94a3b8",display:"block"}}>({fmt(e.hm)}/mois)</span>}</td>
              <td style={{...td_,fontWeight:700,color:BL}}>{s?fmt(s.tH):"0h00"}</td>
              <td style={{...td_,fontWeight:700,color:manque?"#dc2626":BL}}>{manque?`- ${fmt(restant)}`:`+ ${fmt(Math.abs(restant))}`}</td>
              <td style={td_}>{s&&s.jH>0?fmt(s.jH):<span style={{color:"#cbd5e1"}}>—</span>}</td>
              <td style={td_}>{s&&s.nH>0?fmt(s.nH):<span style={{color:"#cbd5e1"}}>—</span>}</td>
              <td style={td_}>{s&&s.supH>0?<span style={{color:"#dc2626",fontWeight:700}}>{fmt(s.supH)}</span>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
              <td style={td_}>{s&&s.fraisT>0?<span style={{fontWeight:600,color:"#1e293b"}}>{s.fraisT.toFixed(2)}€</span>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
            </tr>;})}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

// Les autres composants (Pt, Ann, Hi, Cg, STSection, Eq) sont identiques à la version précédente
// mais utilisent les fonctions async pour sauvegarder

    </div>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:"1.2rem"}}>
      <MNav vm={vm} setVm={setVm}/>

    </div>
    {sSel&&<div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
      <SB col={BL} label="Total pointé" val={fmt(sSel.tH)}/>
      <SB col={BL} label="Contrat (proraté)" val={fmt(conProrata)}/>
      <SB col={sSel.manH>0?"#dc2626":BL} label="Reste à pointer" val={sSel.manH>0?`-${fmt(sSel.manH)}`:`+${fmt(sSel.tH-conProrata)}`}/>
      <SB col="#7c3aed" label="Nuit" val={fmt(sSel.nH)}/>
      <SB col={sSel.supH>0?"#dc2626":"#94a3b8"} label="Heures sup" val={fmt(sSel.supH)}/>
      {sSel.fraisT>0&&<SB col="#d97706" label="💰 Frais" val={`${sSel.fraisT.toFixed(2)}€`}/>}
    </div>}
    {(sel==="all"||Number(sel)===13)&&maregaAbs.length>0&&<div style={{...card,borderLeft:"4px solid #d97706"}}>
      <div style={ctit}>📋 Absences CFA Marega</div>

      <tbody>{maregaAbs.map(a=><tr key={a.id} className="trh"><td style={td_}>{fd(a.date)}</td><td style={td_}><Badge t="cfa">{a.type}</Badge></td><td style={{...td_,color:"#94a3b8"}}>{a.note||"—"}</td><td style={td_}><Btn v="d" style={{padding:"4px 9px",fontSize:"0.72rem"}} onClick={()=>delAbsM(a.id)}>✕</Btn></td></tr>)}</tbody></table>
    </div>}
    <div style={card}>
      <div style={ctit}>{MOIS[Number(vm.split("-")[1])-1]} {vm.split("-")[0]} — {fil.length} entrée{fil.length!==1?"s":""}</div>

        <tbody>{fil.map(p=>{const e=emp.find(x=>x.id===p.empId);return<tr key={p.id} className="trh">
          <td style={td_}>{fd(p.date)}</td><td style={td_}><b style={{color:BL}}>{e?.nom}</b> <span style={{color:"#64748b"}}>{e?.prenom}</span></td>
          <td style={td_}>{p.debut}</td><td style={td_}>{p.fin}</td>
          <td style={td_}><b style={{color:BL}}>{fmt(Number(p.total))}</b></td>
          <td style={{...td_,color:"#d97706"}}>{Number(p.jour)>0?fmt(Number(p.jour)):"—"}</td>
          <td style={{...td_,color:"#7c3aed"}}>{Number(p.nuit)>0?fmt(Number(p.nuit)):"—"}</td>
          <td style={td_}>{Number(p.grandDeplacement)>0?<Badge t="gd">{p.grandDeplacement}h</Badge>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
          <td style={td_}>{Number(p.frais)>0?<span style={{color:"#d97706",fontWeight:700}}>{Number(p.frais).toFixed(2)}€{p.fraisNote&&<span style={{fontSize:"0.68rem",color:"#94a3b8",display:"block",fontWeight:400}}>{p.fraisNote}</span>}</span>:<span style={{color:"#cbd5e1"}}>—</span>}</td>

function Ann({ES,pts,cgs,vm,setVm,emp}){
  const[sel,setSel]=useState("all");const[y]=vm.split("-").map(Number);
  const mData=useMemo(()=>Array.from({length:12},(_,i)=>{
    const m2=`${y}-${String(i+1).padStart(2,"0")}`;
    if(sel==="all"){let tH=0,tN=0,tS=0,tC=0;emp.forEach(e=>{const s=calcStats(e.id,pts,cgs,emp,{m:m2});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;}});return{m2,tH,tN,tS,tC,nb:pts.filter(p=>mk(p.date)===m2).length};}
    else{const s=calcStats(Number(sel),pts,cgs,emp,{m:m2});return{m2,tH:s?.tH||0,tN:s?.nH||0,tS:s?.supH||0,tC:s?.con||0,nb:s?.pts.length||0};}
  }),[y,sel,pts,cgs,emp]);
  const aS=useMemo(()=>{const yy=String(y);if(sel==="all"){let tH=0,tN=0,tS=0,tC=0;emp.forEach(e=>{const s=calcStats(e.id,pts,cgs,emp,{y:yy});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;}});return{tH,tN,tS,tC};}else{const s=calcStats(Number(sel),pts,cgs,emp,{y:yy});return{tH:s?.tH||0,tN:s?.nH||0,tS:s?.supH||0,tC:s?.con||0};}},[y,sel,pts,cgs,emp]);
  const maxH=Math.max(...mData.map(d=>d.tH),1);
  return <div>
    <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center",marginBottom:"1.2rem"}}>
      <MNav vm={vm} setVm={setVm} yOnly/>
      <select style={{...inp,width:260}} value={sel} onChange={e=>setSel(e.target.value)}><option value="all">Toute l'équipe</option>{emp.map(e=><option key={e.id} value={e.id}>{e.nom} {e.prenom}</option>)}</select>
    </div>
    <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
      <SB col={BL} label={`Total ${y}`} val={fmt(aS.tH)} sub={`contrat: ${fmt(aS.tC)}`}/><SB col="#7c3aed" label="Nuit" val={fmt(aS.tN)}/><SB col="#d97706" label="Sup" val={fmt(aS.tS)}/><SB col={aS.tH-aS.tC>=0?"#16a34a":"#dc2626"} label="Écart" val={(aS.tH-aS.tC>=0?"+":"")+fmt(aS.tH-aS.tC)}/>
    </div>
    <div style={card}>
      <div style={ctit}>Heures par mois — {y}</div>
      <div style={{display:"flex",gap:4,alignItems:"flex-end",height:140,paddingBottom:"0.8rem"}}>
        {mData.map((d,i)=>{const hp=maxH>0?(d.tH/maxH)*100:0;const np=d.tH>0?(d.tN/d.tH)*100:0;const cur=Number(vm.split("-")[1])===i+1;
          return<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}} onClick={()=>setVm(`${y}-${String(i+1).padStart(2,"0")}`)}>
            <div style={{fontSize:"0.48rem",color:d.tH>0?BL:"#cbd5e1",fontWeight:700,whiteSpace:"nowrap"}}>{d.tH>0?fmt(d.tH):""}</div>
            <div style={{width:"100%",height:100,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
              <div style={{width:"100%",borderRadius:"4px 4px 0 0",overflow:"hidden",height:`${Math.max(hp,2)}%`,border:cur?`2px solid ${BL}`:"none"}}>
                <div style={{width:"100%",height:`${np}%`,background:"#7c3aed",minHeight:d.tN>0?2:0}}/><div style={{width:"100%",height:`${100-np}%`,background:cur?BL:BL3}}/>
              </div>
            </div>
            <div style={{fontSize:"0.54rem",color:cur?BL:"#94a3b8",fontWeight:cur?700:500}}>{MC[i]}</div>
          </div>;})}
      </div>
    </div>
    <div style={card}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr>{["Mois","Entrées","Total","Jour","Nuit","Sup","Contrat","Écart"].map(h=><th key={h} style={th_}>{h}</th>)}</tr></thead>
      <tbody>{mData.map((d,i)=>{const ec=d.tH-d.tC;const cur=Number(vm.split("-")[1])===i+1;
        return<tr key={i} className="trh" onClick={()=>setVm(`${y}-${String(i+1).padStart(2,"0")}`)} style={{cursor:"pointer",background:cur?"#f0f4fb":""}}>
          <td style={{...td_,fontWeight:cur?700:400,color:cur?BL:"#1e293b"}}>{MOIS[i]} {y}</td>
          <td style={{...td_,color:"#94a3b8"}}>{d.nb||"—"}</td>
          <td style={td_}><b style={{color:d.tH>0?BL:"#cbd5e1"}}>{fmt(d.tH)}</b></td>
          <td style={{...td_,color:"#d97706"}}>{d.tH-d.tN>0?fmt(d.tH-d.tN):"—"}</td>
          <td style={{...td_,color:"#7c3aed"}}>{d.tN>0?fmt(d.tN):"—"}</td>
          <td style={td_}>{d.tS>0?<Badge t="sp">{fmt(d.tS)}</Badge>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
          <td style={{...td_,color:"#94a3b8"}}>{fmt(d.tC)}</td>
          <td style={td_}><span style={{color:ec>=0?"#16a34a":"#dc2626",fontWeight:700}}>{ec>=0?"+":""}{fmt(ec)}</span></td>
        </tr>;})}
      </tbody>
      <tfoot><tr style={{background:BLL}}>
        <td style={{...td_,fontWeight:700,color:BL}}>TOTAL {y}</td>
        <td style={{...td_,color:"#94a3b8"}}>{pts.filter(p=>yk(p.date)===String(y)&&(sel==="all"||p.empId===Number(sel))).length}</td>
        <td style={td_}><b style={{color:BL}}>{fmt(aS.tH)}</b></td>
        <td style={{...td_,color:"#d97706"}}>{fmt(aS.tH-aS.tN)}</td><td style={{...td_,color:"#7c3aed"}}>{fmt(aS.tN)}</td>
        <td style={td_}><b style={{color:"#d97706"}}>{fmt(aS.tS)}</b></td>
        <td style={{...td_,color:"#94a3b8"}}>{fmt(aS.tC)}</td>
        <td style={td_}><span style={{color:aS.tH-aS.tC>=0?"#16a34a":"#dc2626",fontWeight:700}}>{fmt(aS.tH-aS.tC)}</span></td>
      </tr></tfoot>
    </table></div></div>
  </div>;
}

function Cg({ES,cgs,setShowC,delC,emp,pts}){
  const[sel,setSel]=useState("all");
  const fil=cgs.filter(c=>sel==="all"||c.empId===Number(sel)).sort((a,b)=>new Date(b.debut)-new Date(a.debut));

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:"1.2rem"}}>

      <tbody>{emp.map(e=>{const s=ES(e.id,null);const acq=cpAcquis(e.debut);const cpR=s?s.sCP:acq;const ss=s?s.ssP:0;

          <td style={td_}><b style={{color:BL}}>{e.nom}</b> <span style={{color:"#64748b"}}>{e.prenom}</span></td>
          <td style={{...td_,color:"#94a3b8",fontSize:"0.76rem"}}>{fd(e.debut)}</td>
          <td style={{...td_,color:"#16a34a",fontWeight:600}}>{acq.toFixed(1)}j</td>
          <td style={{...td_,color:"#dc2626"}}>{s?.cpP||0}j</td>
          <td style={td_}><b style={{color:cpR<1?"#dc2626":cpR<5?"#d97706":"#16a34a"}}>{cpR.toFixed(1)}j</b></td>
          <td style={td_}>{ss>0?<Badge t="ss">{ss}j</Badge>:<span style={{color:"#cbd5e1"}}>—</span>}</td>
          <td style={{...td_,color:"#94a3b8"}}>{s?.mlP||0}j</td>
          <td style={td_}><Badge t={e.statut==="CDI"?"ok":"dy"}>{e.statut}</Badge></td>
