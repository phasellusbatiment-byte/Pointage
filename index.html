const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwWMddlHOQ_EEItu1HmHs2xvCq83tYg56t8sviASXA037s9pV2hL2ikoXt3_trRL_j0/exec";

async function sheetRead(sheetName){
  try{
    const r=await fetch(`${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheetName)}`);
    if(!r.ok)return[];
    const d=await r.json();
    return Array.isArray(d)?d:[];
  }catch{return[];}
}

async function sheetWrite(sheetName,values){
  try{
    const r=await fetch(APPS_SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({sheet:sheetName,action:"write",values})
    });
    const d=await r.json();
    return d.status==="ok";
  }catch{return false;}
}

// Convertir tableau Google Sheets -> objets
function rowsToObjects(rows){
  if(!rows||rows.length<2)return[];
  const headers=rows[0];
  return rows.slice(1).map(row=>Object.fromEntries(headers.map((h,i)=>[h,row[i]||""])));
}

// UTILS
// ==============================================
function pmn(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function calcH(d,f,p=0){
  if(!d||!f)return{total:0,jour:0,nuit:0};
  let dm=pmn(d),fm=pmn(f);if(fm<=dm)fm+=1440;
  const tot=fm-dm-p;if(tot<=0)return{total:0,jour:0,nuit:0};
  let nuit=0;for(let i=dm;i<dm+tot;i++){const x=i%1440;if(x>=1260||x<360)nuit++;}
  return{total:tot/60,jour:(tot-nuit)/60,nuit:nuit/60};
}
function fmt(h){if(!h||isNaN(h))return"0h00";const s=h<0?"-":"";const a=Math.abs(h);return`${s}${Math.floor(a)}h${Math.round((a-Math.floor(a))*60).toString().padStart(2,"0")}`;}
function fd(d){if(!d)return"-";return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function mk(d){return d?d.slice(0,7):"";}
function yk(d){return d?d.slice(0,4):"";}
function jOuv(d1,d2){if(!d1||!d2)return 0;let d=new Date(d1+"T12:00:00"),e=new Date(d2+"T12:00:00"),c=0;while(d<=e){if(d.getDay()!==0&&d.getDay()!==6)c++;d.setDate(d.getDate()+1);}return c;}
function heuresProrata(hm, debutStr, moisStr) {
  if (!debutStr || !moisStr) return hm;
  const debutMois = debutStr.slice(0,7);
  // Si le technicien n'etait pas encore la ce mois -> 0h
  if (debutMois > moisStr) return 0;
  // Si le mois est anterieur au debut -> hm complet
  if (debutMois < moisStr) return hm;
  // Meme mois -> proratiser
  const [y,m] = moisStr.split('-').map(Number);
  const debut = new Date(debutStr + 'T12:00:00');
  const finMois = new Date(y, m, 0);
  let totalOuvres = 0, depuisDebut = 0;
  let d = new Date(y, m-1, 1);
  while (d <= finMois) {
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      totalOuvres++;
      if (d >= debut) depuisDebut++;
    }
    d.setDate(d.getDate() + 1);
  }
  if (totalOuvres === 0) return hm;
  return Math.round((hm * depuisDebut / totalOuvres) * 100) / 100;
}

function cpAcquis(debutStr){
  if(!debutStr)return 0;const debut=new Date(debutStr+"T12:00:00");const now=new Date();if(debut>now)return 0;
  let mois=0,d=new Date(debut);while(true){const next=new Date(d);next.setMonth(next.getMonth()+1);if(next>now)break;mois++;d=next;}
  return Math.round(mois*2.5*10)/10;
}

function xCSV(data,fn){
  if(!data||!data.length)return;
  const h=Object.keys(data[0]);
  const rows=[h.join(";"),...data.map(r=>h.map(k=>{const v=r[k];return typeof v==="string"&&(v.includes(";")||v.includes("\n"))?`"${v}"`:v??"";}).join(";"))];
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8"}));a.download=fn;a.click();
}

function calcStats(eid,pts,cgs,emp,filt){
  const e=emp.find(x=>x.id===eid);if(!e)return null;
  const p=pts.filter(p=>{
    if(p.empId!==eid)return false;
    if(!filt)return true;
    if(filt.m)return mk(p.date)===filt.m;
    if(filt.y)return yk(p.date)===filt.y;
    return true;
  });
  const tH=p.reduce((s,x)=>s+(Number(x.total)||0),0);
  const nH=p.reduce((s,x)=>s+(Number(x.nuit)||0),0);
  const jH=p.reduce((s,x)=>s+(Number(x.jour)||0),0);
  const gdH=p.reduce((s,x)=>s+(Number(x.grandDeplacement)||0),0);
  const fraisT=p.reduce((s,x)=>s+(Number(x.frais)||0),0);
  let con=e.hm;if(filt?.y)con=e.hm*12;
  const supH=Math.max(0,tH-con),manH=Math.max(0,con-tH);
  const acq=cpAcquis(e.debut);
  const cpP=cgs.filter(c=>c.empId===eid&&c.type==="CP").reduce((s,c)=>s+(Number(c.jours)||0),0);
  const mlP=cgs.filter(c=>c.empId===eid&&(c.type==="Maladie"||c.type==="Absence CFA")).reduce((s,c)=>s+(Number(c.jours)||0),0);
  const ssP=cgs.filter(c=>c.empId===eid&&c.type==="Sans solde").reduce((s,c)=>s+(Number(c.jours)||0),0);
  return{tH,nH,jH,gdH,fraisT,supH,manH,con,acq,sCP:Math.max(0,acq-cpP),cpP,mlP,ssP,pts:p,e};
}

function calcAlerts(emp,pts,cgs,planning){
  var t=new Date();var lim=new Date();lim.setHours(6,0,0,0);
  var finStr=(t<lim?new Date(t.getTime()-86400000):t).toISOString().slice(0,10);
  var EX=[1,2,3,12,13];
  return emp.filter(function(e){return e.statut==="CDI"||e.statut==="CDD";}).map(function(e){
    var js=[];var d=new Date("2026-04-10T12:00:00");var f=new Date(finStr+"T12:00:00");
    while(d<=f){js.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
    var mq=js.filter(function(j){
      if(EX.indexOf(e.id)>=0&&j<"2026-04-21")return false;
      if(j<e.debut)return false;
      var dw=new Date(j+"T12:00:00").getDay();
      if(dw===0||dw===6){var ip=(planning||[]).some(function(p){return p.date===j&&(p.techniciens||[]).includes(e.id);});if(!ip)return false;}
      return !(pts||[]).some(function(p){return p.empId===e.id&&p.date===j;})&&!(cgs||[]).some(function(c){return c.empId===e.id&&c.debut<=j&&c.fin>=j;});
    });
    return mq.length>0?{e:e,mq:mq}:null;
  }).filter(Boolean);
}

// DASHBOARD
// ==============================================
function Dash({ES,vm,setVm,pts,cgs,emp,stInter,stListe,planning}){
  let tH=0,tN=0,tS=0,tC=0,tGD=0,tFrais=0;
  emp.forEach(e=>{const s=ES(e.id,{m:vm});if(s){tH+=s.tH;tN+=s.nH;tS+=s.supH;tC+=s.con;tGD+=s.gdH;tFrais+=s.fraisT;}});
  const stM=stInter.filter(s=>mk(s.date)===vm);
  // Calcul semaine courante
  function getSemDeb(){const d=new Date();const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));d.setHours(0,0,0,0);return d;}
  const semDeb=getSemDeb();const semFin=new Date(semDeb);semFin.setDate(semDeb.getDate()+6);
  function fmtD2(d){return d.toISOString().slice(0,10);}
  const semDebStr=fmtD2(semDeb),semFinStr=fmtD2(semFin);
  const[y,m]=vm.split("-").map(Number);
  // Alertes pointages manquants depuis 21/04/2026
  const DATE_START="2026-04-21";
  const todayStr=new Date().toISOString().slice(0,10);
  function joursDepuis(){
    const jours=[];let d=new Date(DATE_START+"T12:00:00");
    const fin=new Date(todayStr+"T12:00:00");
    while(d<=fin){if(d.getDay()!==0)jours.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
    return jours;
  }
  const tousJours=joursDepuis();
  const yaw=stListe?stListe.find(s=>s.nom==="YAW OBENG"):null;
  // Alertes salaries
  var EXEMPTS=[1,2,3,12,13];
  const alertesSal=emp.filter(function(e){return e.statut==="CDI"||e.statut==="CDD";}).map(function(e){
    var joursEmp=[];
    var dv=new Date("2026-04-10T12:00:00");
    var fv=new Date(todayStr+"T12:00:00");
    while(dv<=fv){
      joursEmp.push(dv.toISOString().slice(0,10));
      dv.setDate(dv.getDate()+1);
    }
    var manquants=joursEmp.filter(function(jour){
      if(EXEMPTS.indexOf(e.id)>=0&&jour<"2026-04-21")return false;
      if(jour<e.debut)return false;
      // Sam/Dim : alerte seulement si dans le planning
      var jourDate=new Date(jour+"T12:00:00");
      var dowJ=jourDate.getDay();
      if(dowJ===6||dowJ===0){
        var dansPlWE=planning&&planning.some(function(p){return p.date===jour&&(p.techniciens||[]).includes(e.id);});
        if(!dansPlWE)return false;
      }
      return !pts.some(function(p){return p.empId===e.id&&p.date===jour;})&&!cgs.some(function(c){return c.empId===e.id&&c.debut<=jour&&c.fin>=jour;});
    });
    return manquants.length>0?{e:{...e,isst:false},manquants}:null;
  }).filter(Boolean);
  // Alertes ST via planning
  var alertesST=[];
  if(stListe&&planning){
    stListe.forEach(function(st){
      var stPlanId="st_"+st.id;
      var joursPlanning=[...new Set(planning.filter(function(p){return (p.techniciens||[]).includes(stPlanId)&&p.date<=todayStr;}).map(function(p){return p.date;}))].sort();
      var manquants=joursPlanning.filter(function(jour){return !stInter.some(function(i){return i.stId===st.id&&i.date===jour&&i.lignes&&i.lignes.length>0;});});
      if(manquants.length>0)alertesST.push({e:{id:stPlanId,nom:st.nom,prenom:"",isst:true},manquants});
    });
  }
  const alertes=[...alertesSal,...alertesST];
  const[showAl,setShowAl]=React.useState(true);
  return <div>
    {alertes.length>0&&<div style={{background:"#fef2f2",border:"2px solid #fecaca",borderRadius:12,padding:"1rem 1.5rem",marginBottom:"1.2rem",display:"flex",alignItems:"center",gap:12}}>
    <span style={{fontSize:"1.3rem"}}>!</span>
    <span style={{fontWeight:800,fontSize:"1rem",color:"#dc2626"}}>{alertes.length} pointage{alertes.length>1?"s":""} manquant{alertes.length>1?"s":""}</span>
    <span style={{fontSize:"0.82rem",color:"#94a3b8"}}>(voir onglet Pointage et Suivi)</span>
  </div>}
    {showAl&&alertes.length===0&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"0.8rem 1.2rem",marginBottom:"1.2rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{color:"#16a34a",fontWeight:600,fontSize:"0.85rem"}}>Tous les pointages sont a jour !</span>
      <button onClick={()=>setShowAl(false)} style={{background:"transparent",border:"none",color:"#16a34a",fontSize:"1.3rem",cursor:"pointer"}}>&times;</button>

                const restSem=Math.max(0,(e.hm/4.33)-hSem);
                return <span style={{color:restSem>0?"#dc2626":"#16a34a",fontWeight:700}}>{fmt(restSem)}</span>;
              })()}</td>
              <td style={{...td_,fontWeight:700,color:manque?"#dc2626":BL}}>{conProrata===0?<span style={{color:"#cbd5e1"}}>-</span>:manque?"- "+fmt(restant):"+ "+fmt(Math.abs(restant))}</td>
              <td style={td_}>{s&&s.jH>0?fmt(s.jH):<span style={{color:"#cbd5e1"}}>-</span>}</td>
              <td style={td_}>{s&&s.nH>0?fmt(s.nH):<span style={{color:"#cbd5e1"}}>-</span>}</td>

            </tr>;})}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

function Ann({ES,pts,cgs,vm,setVm,emp}){

  const maxH=Math.max(...mData.map(d=>d.tH),1);

          return<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}} onClick={()=>setVm(`${y}-${String(i+1).padStart(2,"0")}`)}>

              <div style={{width:"100%",borderRadius:"4px 4px 0 0",overflow:"hidden",height:Math.max(hp,2)+"%",border:cur?"2px solid "+BL:"none"}}>
                <div style={{width:"100%",height:np+"%",background:"#7c3aed",minHeight:d.tN>0?2:0}}/><div style={{width:"100%",height:(100-np)+"%",background:cur?BL:BL3}}/>

          <td style={{...td_,color:"#94a3b8",fontSize:"0.76rem"}}>{fd(e.debut)}</td>
          <td style={{...td_,color:"#16a34a",fontWeight:600}}>{acq.toFixed(1)}j</td>
          <td style={{...td_,color:"#dc2626"}}>{s?.cpP||0}j</td>
          <td style={td_}><b style={{color:cpR<1?"#dc2626":cpR<5?"#d97706":"#16a34a"}}>{cpR.toFixed(1)}j</b></td>
          <td style={td_}>{ss>0?<Badge t="ss">{ss}j</Badge>:<span style={{color:"#cbd5e1"}}>-</span>}</td>
          <td style={{...td_,color:"#94a3b8"}}>{s?.mlP||0}j</td>
          <td style={td_}><Badge t={e.statut==="CDI"?"ok":"dy"}>{e.statut}</Badge></td>
        </tr>;})}
      </tbody>
    </table></div></div>
    <div style={card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:"1rem"}}>
        <div style={ctit}>Absences ({fil.length})</div>
        <select style={{...inp,width:220}} value={sel} onChange={e=>setSel(e.target.value)}><option value="all">Tous</option>{emp.map(e=><option key={e.id} value={e.id}>{e.nom} {e.prenom}</option>)}</select>
      </div>
      {fil.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#94a3b8"}}><div style={{fontSize:"2rem",marginBottom:8}}></div>Aucune absence</div>
      :<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>{["Collaborateur","Type","Debut","Fin","Jours ouvres","Note",""].map(h=><th key={h} style={th_}>{h}</th>)}</tr></thead>
        <tbody>{fil.map(c=>{const e=emp.find(x=>x.id===c.empId);const bt=c.type==="Maladie"?"ml":c.type==="Sans solde"?"ss":c.type==="Formation"?"fo":c.type==="Absence CFA"?"cfa":"cg";
          return<tr key={c.id} className="trh"><td style={td_}><b style={{color:BL}}>{e?.nom}</b> <span style={{color:"#64748b"}}>{e?.prenom}</span></td>
            <td style={td_}><Badge t={bt}>{c.type}</Badge></td><td style={td_}>{fd(c.debut)}</td><td style={td_}>{fd(c.fin)}</td>
            <td style={{...td_,color:"#16a34a",fontWeight:600}}>{c.jours}j</td>
            <td style={{...td_,color:"#94a3b8",fontSize:"0.74rem"}}>{c.note||"-"}</td>
            <td style={td_}><div style={{display:"flex",gap:4}}><Btn v="g" style={{padding:"4px 8px",fontSize:"0.72rem"}} onClick={()=>setEditC(c)}>edit</Btn><Btn v="d" style={{padding:"4px 9px",fontSize:"0.72rem"}} onClick={()=>delC(c.id)}>&times;</Btn></div></td>
          </tr>;})}
        </tbody>
      </table></div>}
    </div>
  </div>;
}

function STSection({stListe,setStListe,stInter,setStInter,saveSTInter,vm,setVm}){
  const today=new Date();
  const[activeSTId,setActiveSTId]=React.useState(stListe[0]?stListe[0].id:null);
  const[showAddST,setShowAddST]=React.useState(false);
  const[stForm,setStForm]=React.useState({nom:"",type:"individuel",tauxJour:0,tauxNuit:0,tauxDeplIdf:0,tauxDeplHidf:0});
  const[showAddInter,setShowAddInter]=React.useState(false);
  const dInter={stId:activeSTId,date:today.toISOString().slice(0,10),note:""};
  const[interF,setInterF]=React.useState(dInter);
  const dLigne={type:"heure",debut:"",fin:"",nbIdf:"",nbHidf:"",prixMat:"",note:"",nbTech:1};
  const[ligneF,setLigneF]=React.useState(dLigne);
  const[showAddLigne,setShowAddLigne]=React.useState(null);
  const[editLigne,setEditLigne]=React.useState(null);
  const[showEditTarifs,setShowEditTarifs]=React.useState(null);

  function stStats(stId,month){
    var inters=stInter.filter(function(i){return i.stId===stId&&mk(i.date)===month;});
    var totH=0,totNuit=0,totJour=0,totIdf=0,totHidf=0,totMat=0;
    inters.forEach(function(i){if(!i.lignes||!i.lignes.length)return;i.lignes.forEach(function(l){
      var nb=Number(l.nbTech)||1;
      if(l.type==="heure"){totH+=(Number(l.total)||0)*nb;totNuit+=(Number(l.nuit)||0)*nb;totJour+=(Number(l.jour)||0)*nb;}
      else if(l.type==="idf"){totIdf+=Number(l.nombre)||0;}
      else if(l.type==="hidf"){totHidf+=(Number(l.heures)||0)*nb;}
      else if(l.type==="materiaux"){totMat+=Number(l.prix)||0;}
    });});
    var st_=stListe.find(function(s){return s.id===stId;})||{};
    var mJour=totJour*(st_.tauxJour||0),mNuit=totNuit*(st_.tauxNuit||0);
    var mIdf=totIdf*(st_.tauxDeplIdf||0),mHidf=totHidf*(st_.tauxDeplHidf||0);
    var mTotal=mJour+mNuit+mIdf+mHidf+totMat;
    return{totH,totNuit,totJour,totIdf,totHidf,totMat,mJour,mNuit,mIdf,mHidf,mTotal,nbInter:inters.length};
  }

  function addST(){if(!stForm.nom.trim())return;var newId=stListe.length>0?Math.max.apply(null,stListe.map(function(s){return s.id;}))+1:1;var nst={id:newId,nom:stForm.nom.toUpperCase(),type:stForm.type,tauxJour:stForm.tauxJour||0,tauxNuit:stForm.tauxNuit||0,tauxDeplIdf:stForm.tauxDeplIdf||0,tauxDeplHidf:stForm.tauxDeplHidf||0};setStListe(function(p){return [...p,nst];});setActiveSTId(newId);setShowAddST(false);setStForm({nom:"",type:"individuel",tauxJour:0,tauxNuit:0,tauxDeplIdf:0,tauxDeplHidf:0});}

  function addInter(){if(!interF.date)return;var newId="i_"+Date.now();var newInter=[...stInter,{id:newId,stId:Number(activeSTId),date:interF.date,note:interF.note||"",lignes:[]}];setStInter(newInter);setShowAddInter(false);setInterF(dInter);saveSTInter(newInter);}

  async function addLigne(interId){
    var t=ligneF.type||"heure",nt=Number(ligneF.nbTech)||1;
    var ligne={id:"l_"+Date.now(),type:t,note:ligneF.note||"",nbTech:nt};
    if(t==="heure"){var h=calcH(ligneF.debut||"",ligneF.fin||"",0);ligne.debut=ligneF.debut||"";ligne.fin=ligneF.fin||"";ligne.total=h.total;ligne.jour=h.jour;ligne.nuit=h.nuit;}
    else if(t==="idf"){ligne.nombre=Number(ligneF.nbIdf)||0;}
    else if(t==="hidf"){ligne.heures=Number(ligneF.nbHidf)||0;}
    else if(t==="materiaux"){ligne.prix=Number(ligneF.prixMat)||0;}
    var newInter=stInter.map(function(i){if(i.id!==interId)return i;return{...i,lignes:(i.lignes||[]).concat([ligne])};});
    setStInter(newInter);setShowAddLigne(null);setLigneF(dLigne);await saveSTInter(newInter);
  }

  function updateLigne(interId,ligneId,upd){
    var newInter=stInter.map(function(i){
      if(i.id!==interId)return i;
      var nl=(i.lignes||[]).map(function(l){
        if(l.id!==ligneId)return l;
        var u={id:l.id,type:upd.type,note:upd.note||"",nbTech:Number(upd.nbTech)||1};
        if(u.type==="heure"){var h=calcH(upd.debut||"",upd.fin||"",0);u.debut=upd.debut||"";u.fin=upd.fin||"";u.total=h.total;u.jour=h.jour;u.nuit=h.nuit;}
        else if(u.type==="idf"){u.nombre=Number(upd.nombre)||0;}
        else if(u.type==="hidf"){u.heures=Number(upd.heures)||0;}
        else if(u.type==="materiaux"){u.prix=Number(upd.prix)||0;}
        return u;
      });
      return{...i,lignes:nl};
    });
    setStInter(newInter);setEditLigne(null);saveSTInter(newInter);
  }

  function updateLigne(interId,ligneId,upd){
    var newInter=stInter.map(function(i){
      if(i.id!==interId)return i;
      var nl=(i.lignes||[]).map(function(l){
        if(l.id!==ligneId)return l;
        var u={id:l.id,type:upd.type,note:upd.note||"",nbTech:Number(upd.nbTech)||1};
        if(u.type==="heure"){var h=calcH(upd.debut||"",upd.fin||"",0);u.debut=upd.debut||"";u.fin=upd.fin||"";u.total=h.total;u.jour=h.jour;u.nuit=h.nuit;}
        else if(u.type==="idf"){u.nombre=Number(upd.nombre)||0;}
        else if(u.type==="hidf"){u.heures=Number(upd.heures)||0;}
        else if(u.type==="materiaux"){u.prix=Number(upd.prix)||0;}
        return u;
      });
      return{...i,lignes:nl};
    });
    setStInter(newInter);setEditLigne(null);saveSTInter(newInter);
  }
  async function delInter(id){var ni=stInter.filter(function(i){return i.id!==id;});setStInter(ni);await saveSTInter(ni);}
  async function delLigne(interId,ligneId){var ni=stInter.map(function(i){if(i.id!==interId)return i;return{...i,lignes:(i.lignes||[]).filter(function(l){return l.id!==ligneId;})};});setStInter(ni);await saveSTInter(ni);}

  function exportST(){
    var label=vm.replace("-","_");
    var rows=[["Sous-traitant","Date","Type","Detail","Nb Tech","Montant EUR"]];
    stInter.forEach(function(i){
      var st=stListe.find(function(s){return s.id===i.stId;})||{nom:"?"};
      if(!i.lignes||!i.lignes.length){rows.push([st.nom,i.date,"","",1,0]);return;}
      i.lignes.forEach(function(l){
        var nb=Number(l.nbTech)||1;
        var detail="",montant=0;
        var stRef=stListe.find(function(s){return s.id===i.stId;})||{};
        if(l.type==="heure"){detail=(l.debut||"")+"-"+(l.fin||"")+" ("+(l.total||0)+"h)";montant=((Number(l.jour)||0)*(stRef.tauxJour||0)+(Number(l.nuit)||0)*(stRef.tauxNuit||0))*nb;}
        else if(l.type==="idf"){detail=(l.nombre||0)+" dep. IDF";montant=(l.nombre||0)*(stRef.tauxDeplIdf||0);}
        else if(l.type==="hidf"){detail=(l.heures||0)+"h Hors IDF";montant=(l.heures||0)*(stRef.tauxDeplHidf||0)*nb;}
        else if(l.type==="materiaux"){detail="Materiaux";montant=l.prix||0;}
        rows.push([st.nom,i.date,l.type,detail,nb,montant.toFixed(2)]);
      });
    });
    var csv=rows.map(function(r){return r.join(";");}).join("\n");
    var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="Phasellus_SousTraitants_"+label+".csv";a.click();
  }
  const activeST=stListe.find(function(s){return s.id===activeSTId;});
  const interST=stInter.filter(function(i){return i.stId===activeSTId&&mk(i.date)===vm;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});

    return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:"1rem"}}>
      <h2 style={{fontWeight:800,fontSize:"1.05rem",color:BL}}> Sous-traitants</h2>
      <div style={{display:"flex",gap:8}}><Btn v="s" style={{fontSize:"0.76rem"}} onClick={exportST}> Export ST</Btn><Btn v="g" style={{fontSize:"0.76rem"}} onClick={()=>setShowAddST(true)}> Nouveau ST</Btn></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem",marginBottom:"1.5rem"}}>
      {stListe.map(function(st){
        var sNow=stStats(st.id,vm);
        var vy2=Number(vm.split("-")[0]),vmo=Number(vm.split("-")[1]);
        var pd=new Date(vy2,vmo-2,1);
        var pm=pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0");
        var sPrev=stStats(st.id,pm);
        return <div key={st.id} style={{background:"#fff",border:"1px solid "+(activeSTId===st.id?BL:"#e2e8f0"),borderRadius:12,padding:"1.2rem",borderTop:"3px solid "+(activeSTId===st.id?BL:"#94a3b8"),cursor:"pointer",boxShadow:activeSTId===st.id?"0 4px 12px rgba(30,58,110,0.1)":"none"}} onClick={function(){setActiveSTId(st.id);}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div><div style={{fontWeight:800,fontSize:"0.92rem",color:BL}}>{st.nom}</div><div style={{fontSize:"0.7rem",color:"#94a3b8",marginTop:2}}>{st.type==="societe"?"Societe":"Individuel"}</div></div>
            <button onClick={function(e){e.stopPropagation();setShowEditTarifs(st.id);}} style={{padding:"3px 10px",borderRadius:6,background:"#f1f5f9",border:"1px solid #e2e8f0",fontSize:"0.7rem",cursor:"pointer",color:"#64748b"}}>edit</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 8px",fontSize:"0.72rem",borderTop:"1px solid #e2e8f0",paddingTop:10,marginBottom:10}}>
            <span style={{color:"#64748b"}}>Taux jour</span><span style={{color:BL,fontWeight:600}}>{st.tauxJour||0} EUR/h</span>
            <span style={{color:"#64748b"}}>Taux nuit</span><span style={{color:"#7c3aed",fontWeight:600}}>{st.tauxNuit||0} EUR/h</span>
            <span style={{color:"#64748b"}}>Depl. IDF</span><span style={{color:"#0369a1",fontWeight:600}}>{st.tauxDeplIdf||0} EUR/dep.</span>
            <span style={{color:"#64748b"}}>Hors IDF</span><span style={{color:"#d97706",fontWeight:600}}>{st.tauxDeplHidf||0} EUR/h</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 8px",fontSize:"0.72rem",borderTop:"1px solid #e2e8f0",paddingTop:10}}>
            <span style={{color:"#94a3b8",fontSize:"0.62rem",fontWeight:700,gridColumn:"1/-1",textTransform:"uppercase",marginBottom:2}}>Mois precedent</span>
            <span style={{color:"#64748b"}}>Budget</span><span style={{color:"#64748b",fontWeight:600}}>{(sPrev.mTotal||0).toFixed(2)} EUR</span>
            <span style={{color:"#94a3b8",fontSize:"0.62rem",fontWeight:700,gridColumn:"1/-1",textTransform:"uppercase",marginTop:4,marginBottom:2}}>Mois en cours</span>
            <span style={{color:"#64748b"}}>Main oeuvre</span><span style={{color:BL,fontWeight:600}}>{((sNow.mJour||0)+(sNow.mNuit||0)).toFixed(2)} EUR</span>
            <span style={{color:"#64748b"}}>Deplacements</span><span style={{color:"#0369a1",fontWeight:600}}>{((sNow.mIdf||0)+(sNow.mHidf||0)).toFixed(2)} EUR</span>
            <span style={{color:"#64748b"}}>Materiaux</span><span style={{color:"#16a34a",fontWeight:600}}>{(sNow.totMat||0).toFixed(2)} EUR</span>
            <span style={{color:"#64748b",fontWeight:700}}>TOTAL</span><span style={{color:(sNow.mTotal||0)>0?"#16a34a":"#cbd5e1",fontWeight:800}}>{(sNow.mTotal||0).toFixed(2)} EUR</span>
            <span style={{color:"#64748b"}}>Interventions</span><span style={{color:BL,fontWeight:600}}>{sNow.nbInter}</span>
          </div>
        </div>;
      })}
    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:"12px 12px 0 0",display:"flex",flexWrap:"wrap",overflowX:"auto"}}>
      {stListe.map(st=><button key={st.id} onClick={()=>setActiveSTId(st.id)} style={{padding:"10px 18px",background:"transparent",border:"none",borderBottom:activeSTId===st.id?"3px solid "+BL:"3px solid transparent",color:activeSTId===st.id?BL:"#64748b",fontFamily:"'Inter',sans-serif",fontWeight:600,fontSize:"0.8rem",whiteSpace:"nowrap",cursor:"pointer"}}>{st.nom}</button>)}
    </div>
    {activeST&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 12px 12px",padding:"1.5rem",marginBottom:"1.2rem"}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        <MNav vm={vm} setVm={setVm}/>
        <Btn v="p" style={{fontSize:"0.78rem"}} onClick={()=>{setInterF({...dInter,stId:activeSTId});setShowAddInter(true);}}>+ Nouvelle intervention</Btn>
      </div>
      {(()=>{const s=stStats(activeSTId,vm);return <div style={{display:"flex",gap:"0.8rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        <SB col={BL} label="Interventions" val={s.nbInter}/><SB col="#7c3aed" label="Heures" val={fmt(s.totH)} sub={`Nuit: ${fmt(s.totNuit)}`}/>
        <SB col="#0369a1" label="Depl. IDF" val={`${s.totIdf} dep.`}/><SB col="#d97706" label="Depl. Hors IDF" val={`${s.totHidf}h`}/><SB col="#16a34a" label="Materiaux" val={`${s.totMat.toLocaleString("fr-FR")}EUR`}/>
      </div>;})()}
      {interST.length===0?<div style={{textAlign:"center",padding:"3rem",color:"#94a3b8"}}><div style={{fontSize:"2rem",marginBottom:8}}></div>Aucune intervention ce mois</div>
      :interST.map(inter=><div key={inter.id} style={{border:"1px solid #e2e8f0",borderRadius:10,marginBottom:"1rem",overflow:"hidden"}}>
        <div style={{background:"#f8fafc",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #e2e8f0"}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <span style={{fontWeight:700,color:BL}}> {fd(inter.date)}</span>
            {inter.note&&<span style={{fontSize:"0.76rem",color:"#64748b"}}>{inter.note}</span>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn v="g" style={{padding:"4px 12px",fontSize:"0.72rem"}} onClick={()=>{setLigneF(dLigne);setShowAddLigne(inter.id);}}>+ Ajouter ligne</Btn>
            <Btn v="d" style={{padding:"4px 10px",fontSize:"0.72rem"}} onClick={()=>delInter(inter.id)}></Btn>
          </div>
        </div>
        {inter.lignes.length===0?<div style={{padding:"1rem",color:"#94a3b8",fontSize:"0.8rem",textAlign:"center"}}>Aucune ligne - ajoutez des prestations</div>
        :<table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Type","Detail","Note",""].map(h=><th key={h} style={{...th_,padding:"8px 12px"}}>{h}</th>)}</tr></thead>
          <tbody>{inter.lignes.map(l=><tr key={l.id} className="trh">
            <td style={td_}>{l.type==="heure"&&<Badge t="heure"> Heures</Badge>}{l.type==="idf"&&<Badge t="idf"> Depl. IDF</Badge>}{l.type==="hidf"&&<Badge t="hidf"> Hors IDF</Badge>}{l.type==="materiaux"&&<Badge t="mat"> Materiaux</Badge>}</td>
            <td style={td_}>
              {l.type==="heure"&&<span><b style={{color:BL}}>{fmt(Number(l.total))}</b> <span style={{color:"#d97706",fontSize:"0.78rem"}}>{fmt(Number(l.jour))}</span> <span style={{color:"#7c3aed",fontSize:"0.78rem"}}>{fmt(Number(l.nuit))}</span> <span style={{color:"#94a3b8",fontSize:"0.74rem"}}>{l.debut}->{l.fin}</span></span>}
              {l.type==="idf"&&<span><b style={{color:"#0369a1",fontSize:"1rem"}}>{l.nombre}</b> <span style={{color:"#64748b",fontSize:"0.78rem"}}>deplacement{Number(l.nombre)>1?"s":""}</span></span>}
              {l.type==="hidf"&&<span><b style={{color:"#d97706"}}>{l.heures}h</b> <span style={{color:"#64748b",fontSize:"0.78rem"}}>hors IDF</span></span>}
              {l.type==="materiaux"&&<span><b style={{color:"#16a34a"}}>{Number(l.prix).toLocaleString("fr-FR")}EUR</b></span>}
            </td>
            <td style={{...td_,color:"#94a3b8",fontSize:"0.76rem"}}>{l.note||"-"}</td>
            <td style={td_}><div style={{display:"flex",gap:4}}><Btn v="g" style={{padding:"3px 8px",fontSize:"0.7rem"}} onClick={()=>setEditLigne({interId:inter.id,ligne:{...l}})}>edit</Btn><Btn v="d" style={{padding:"3px 8px",fontSize:"0.7rem"}} onClick={()=>delLigne(inter.id,l.id)}>&times;</Btn></div></td>
          </tr>)}</tbody>
        </table>}
      </div>)}
    </div>}

    {showAddST&&<div style={modal_} onClick={e=>e.target===e.currentTarget&&setShowAddST(false)}>
      <div style={{...mbox_,maxWidth:520}}>
        <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL}}>Nouveau sous-traitant</div>
        <Row n={2}><F label="Nom"><input type="text" style={inp} value={stForm.nom} placeholder="NOM" onChange={e=>setStForm(p=>({...p,nom:e.target.value.toUpperCase()}))}/></F><F label="Type"><select style={inp} value={stForm.type} onChange={e=>setStForm(p=>({...p,type:e.target.value}))}><option value="individuel">Individuel</option><option value="societe">Societe</option></select></F></Row>
        <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"1rem",marginBottom:"0.8rem"}}>

function Planning({planning,setPlanning,emp,stListe,pts}){
  const[sem,setSem]=React.useState(()=>{const d=new Date();const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));d.setHours(0,0,0,0);return d;});
  const[showAdd,setShowAdd]=React.useState(false);
  const[editItem,setEditItem]=React.useState(null);
  const JOURS=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
  const jours=Array.from({length:7},(_,i)=>{const d=new Date(sem);d.setDate(sem.getDate()+i);return d;});
  function fmtD(d){return d.toISOString().slice(0,10);}
  function fmtA(d){return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});}
  function getLundi(d){const nd=new Date(d);const day=nd.getDay();nd.setDate(nd.getDate()-(day===0?6:day-1));nd.setHours(0,0,0,0);return nd;}
  function prev(){const d=new Date(sem);d.setDate(d.getDate()-7);setSem(d);}
  function next(){const d=new Date(sem);d.setDate(d.getDate()+7);setSem(d);}
  const fin=new Date(sem);fin.setDate(fin.getDate()+6);
  const label="Semaine du "+sem.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})+" au "+fin.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});
  function getI(date){return planning.filter(p=>p.date===fmtD(date)).sort((a,b)=>(a.heureDebut||"").localeCompare(b.heureDebut||""));}
  const dF={date:"",magasin:"",bdc:"",descriptif:"",heureDebut:"",heureFin:"",techniciens:[],livreur:""};
  const[form,setForm]=React.useState(dF);
  function tg(id,sf){sf(p=>({...p,techniciens:(p.techniciens||[]).includes(id)?(p.techniciens||[]).filter(x=>x!==id):[...(p.techniciens||[]),id]}));}
  function addI(){if(!form.date||!form.magasin)return;setPlanning(p=>[...p,{id:"pl"+Date.now(),...form}]);setShowAdd(false);setForm(dF);}
  function saveE(){setPlanning(p=>p.map(x=>x.id===editItem.id?editItem:x));setEditItem(null);}
  function delI(id){setPlanning(p=>p.filter(x=>x.id!==id));}
  function exportP(){
    var ths=JOURS.map(function(j,i){return "<th style='background:#1e3a6e;color:white;padding:8px;font-size:11px;border:1px solid #1e3a6e'>"+j+"<br>"+fmtA(jours[i])+"</th>";}).join("");
    var tds=jours.map(function(jour){
      var cells=getI(jour).map(function(inter){
        var techs=(inter.techniciens||[]).map(function(id){var e=emp.find(function(x){return x.id===id;});var st=stListe.find(function(x){return "st_"+x.id===id;});return e?e.nom:st?st.nom:"?";}).join(", ")||"-";
        var h=inter.heureDebut?(inter.heureDebut+(inter.heureFin?" - "+inter.heureFin:"")):"-";
        return "<div style='background:#e8eef7;border-radius:4px;padding:5px;margin-bottom:3px;font-size:10px'><b style='color:#1e3a6e'>"+inter.magasin+"</b><br>"+(inter.bdc?"BDC:"+inter.bdc+"<br>":"")+(inter.descriptif?inter.descriptif+"<br>":"")+"<b style='color:#d97706'>"+h+"</b><br>Tech:"+techs+(inter.livreur?"<br>Livr:"+inter.livreur:"")+"</div>";
      }).join("");
      return "<td style='vertical-align:top;padding:6px;border:1px solid #e2e8f0;min-width:120px'>"+cells+"</td>";
    }).join("");
    var html="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Planning Phasellus</title></head><body style='font-family:Arial;margin:20px'><h2 style='color:#1e3a6e'>PHASELLUS BATIMENT - PLANNING</h2><p>"+label+"</p><table style='width:100%;border-collapse:collapse'><thead><tr>"+ths+"</tr></thead><tbody><tr>"+tds+"</tr></tbody></table><p style='font-size:10px;color:#94a3b8'>Genere le "+new Date().toLocaleDateString("fr-FR")+"</p></body></html>";
    var blob=new Blob([html],{type:"text/html;charset=utf-8"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="Planning_Phasellus.html";a.click();
  }
  const SI={background:"#fff",border:"1px solid #cbd5e1",borderRadius:8,color:"#1e293b",fontFamily:"'Inter',sans-serif",fontSize:"0.87rem",padding:"9px 12px",width:"100%"};
  const SL={fontSize:"0.72rem",color:"#64748b",fontWeight:600,letterSpacing:"0.5px",display:"block",marginBottom:5,textTransform:"uppercase"};

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:"1.2rem"}}>
      <h2 style={{fontWeight:800,fontSize:"1.05rem",color:BL}}>Planning Hebdomadaire</h2>
      <div style={{display:"flex",gap:8}}>
        <button onClick={exportP} style={{padding:"9px 18px",borderRadius:8,background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",cursor:"pointer",fontWeight:600,fontSize:"0.82rem"}}>Exporter</button>
        <button onClick={()=>{setForm({...dF,date:fmtD(jours[0])});setShowAdd(true);}} style={{padding:"9px 18px",borderRadius:8,background:BL,color:"#fff",border:"none",cursor:"pointer",fontWeight:600,fontSize:"0.82rem"}}>+ Nouvelle intervention</button>
      </div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.2rem",flexWrap:"wrap"}}>
      <button onClick={prev} style={{padding:"6px 14px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",cursor:"pointer",fontWeight:900,color:BL,fontSize:"1rem"}}>&lt;&lt;</button>
      <button onClick={()=>setSem(getLundi(new Date()))} style={{padding:"6px 14px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",cursor:"pointer",fontWeight:600,color:BL}}>Aujourd'hui</button>
      <button onClick={next} style={{padding:"6px 14px",borderRadius:8,background:"#fff",border:"1px solid #e2e8f0",cursor:"pointer",fontWeight:900,color:BL,fontSize:"1rem"}}>&gt;&gt;</button>
      <span style={{fontWeight:600,fontSize:"0.85rem",color:BL,marginLeft:8}}>{label}</span>
    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"1rem",marginBottom:"1.2rem",overflowX:"auto"}}>
      <div style={{fontSize:"0.72rem",fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"0.8rem"}}>Heures restantes par technicien</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"0.6rem"}}>
        {emp.map(function(e){
          var semDeb2=new Date(sem);var semFin2=new Date(sem);semFin2.setDate(semFin2.getDate()+6);
          var semDebS=fmtD(semDeb2),semFinS=fmtD(semFin2);
          var moisS=semDeb2.getFullYear()+"-"+String(semDeb2.getMonth()+1).padStart(2,"0");
          var hSem=pts.filter(function(p){return p.empId===e.id&&p.date>=semDebS&&p.date<=semFinS;}).reduce(function(s,x){return s+(Number(x.total)||0);},0);
          var hMois=pts.filter(function(p){return p.empId===e.id&&p.date.slice(0,7)===moisS;}).reduce(function(s,x){return s+(Number(x.total)||0);},0);
          var restSem=Math.max(0,(e.hm/4.33)-hSem);
          var restMois=Math.max(0,e.hm-hMois);
          var coulSem=restSem<5?"#16a34a":restSem<20?"#d97706":"#dc2626";
          var coulMois=restMois<10?"#16a34a":restMois<50?"#d97706":"#dc2626";
          return <div key={e.id} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"8px 12px",minWidth:160}}>
            <div style={{fontWeight:700,fontSize:"0.78rem",color:"#1e293b",marginBottom:4}}>{e.nom} {e.prenom}</div>
            <div style={{display:"flex",gap:8,fontSize:"0.72rem"}}>
              <span>Sem: <b style={{color:coulSem}}>{fmt(restSem)}</b></span>
              <span>Mois: <b style={{color:coulMois}}>{fmt(restMois)}</b></span>
            </div>
          </div>;
        })}
      </div>
    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"2px solid #e2e8f0"}}>
        {jours.map((jour,i)=>{const isT=fmtD(jour)===fmtD(new Date());const nb=getI(jour).length;
          return <div key={i} style={{padding:"10px 8px",textAlign:"center",background:isT?BL:"#f8fafc",borderRight:i<6?"1px solid #e2e8f0":"none"}}>
            <div style={{fontWeight:700,fontSize:"0.82rem",color:isT?"#fff":BL}}>{JOURS[i]}</div>
            <div style={{fontSize:"0.75rem",color:isT?"#bfdbfe":"#94a3b8",marginTop:2}}>{fmtA(jour)}</div>
            {nb>0&&<div style={{marginTop:4,display:"inline-block",padding:"1px 8px",borderRadius:100,fontSize:"0.6rem",fontWeight:700,background:isT?"rgba(255,255,255,0.2)":"#e8eef7",color:isT?"#fff":BL}}>{nb}</div>}
          </div>;})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",minHeight:400,alignItems:"start"}}>
        {jours.map((jour,i)=>{const inters=getI(jour);const isT=fmtD(jour)===fmtD(new Date());
          return <div key={i} style={{padding:"8px",borderRight:i<6?"1px solid #f1f5f9":"none",minHeight:400,background:isT?"#fafbff":"#fff"}}>
            <button onClick={()=>{setForm({...dF,date:fmtD(jour)});setShowAdd(true);}} style={{width:"100%",padding:"5px",background:"transparent",border:"1px dashed #cbd5e1",borderRadius:6,color:"#94a3b8",fontSize:"0.7rem",cursor:"pointer",marginBottom:6}}>+ Ajouter</button>
            {inters.map(inter=>{
              const techs=(inter.techniciens||[]).map(id=>{const e=emp.find(x=>x.id===id);const st=stListe.find(x=>"st_"+x.id===id);return e?e.nom:st?st.nom:"?";});
              const isN=inter.heureDebut&&["21","22","23","00","01","02","03","04","05"].some(h=>inter.heureDebut.startsWith(h));
              return <div key={inter.id} style={{background:isN?"#1e3a6e":BLL,border:"1px solid "+(isN?"#2d4f8e":"#bfdbfe"),borderRadius:8,padding:"7px 8px",marginBottom:6,cursor:"pointer",position:"relative"}} onClick={()=>setEditItem({...inter})}>
                <div style={{fontWeight:700,fontSize:"0.78rem",color:isN?"#fff":BL,marginBottom:2,paddingRight:16}}>{inter.magasin}</div>
                {inter.bdc&&<div style={{fontSize:"0.64rem",color:isN?"#93c5fd":"#64748b",marginBottom:2}}>BDC: {inter.bdc}</div>}
                {inter.descriptif&&<div style={{fontSize:"0.68rem",color:isN?"#e2e8f0":"#475569",marginBottom:2}}>{inter.descriptif}</div>}
                {inter.heureDebut&&<div style={{fontSize:"0.7rem",fontWeight:700,color:isN?"#fbbf24":"#d97706",marginBottom:2}}>{inter.heureDebut}{inter.heureFin?" - "+inter.heureFin:""}</div>}
                {techs.length>0&&<div style={{fontSize:"0.64rem",color:isN?"#86efac":"#16a34a"}}>Tech: {techs.join(" / ")}</div>}
                {inter.livreur&&<div style={{fontSize:"0.64rem",color:isN?"#c4b5fd":"#7c3aed"}}>Livr: {inter.livreur}</div>}
                <button onClick={ev=>{ev.stopPropagation();delI(inter.id);}} style={{position:"absolute",top:4,right:4,background:"transparent",border:"none",color:isN?"rgba(255,255,255,0.6)":"#94a3b8",fontSize:"1rem",fontWeight:700,cursor:"pointer",lineHeight:1}}>&times;</button>
              </div>;})}
          </div>;})}
      </div>
    </div>
    {showAdd&&<ModalPlanning f={form} sf={setForm} onSave={addI} onClose={()=>{setShowAdd(false);setForm(dF);}} title="Nouvelle intervention" emp={emp} stListe={stListe}/>}
    {editItem&&<ModalPlanning f={editItem} sf={setEditItem} onSave={saveE} onClose={()=>setEditItem(null)} title="Modifier intervention" emp={emp} stListe={stListe} extraBtn={<button onClick={()=>{delI(editItem.id);setEditItem(null);}} style={{padding:"9px 18px",borderRadius:8,background:"#fef2f2",color:"#ef4444",border:"1px solid #fecaca",cursor:"pointer",fontWeight:600,fontSize:"0.82rem"}}>Supprimer</button>}/>}
  </div>;
}

// MODAL EDIT POINTAGE
function ModalEditP({p,emp,onSave,onClose}){
  const[f,setF]=React.useState({debut:p.debut||"",fin:p.fin||"",pause:p.pause||0,grandDeplacement:p.grandDeplacement||0,frais:p.frais||0,fraisNote:p.fraisNote||"",note:p.note||""});
  const e=emp.find(x=>x.id===p.empId);
  function save(){const h=calcH(f.debut,f.fin,Number(f.pause));onSave(p.id,{...f,pause:Number(f.pause),grandDeplacement:Number(f.grandDeplacement),frais:Number(f.frais),...h});}
  return <div style={modal_} onClick={ev=>ev.target===ev.currentTarget&&onClose()}>
    <div style={mbox_}>
      <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>
        Modifier pointage{e?" - "+e.nom+" "+e.prenom:""}
        <Btn v="g" style={{padding:"4px 10px"}} onClick={onClose}>&times;</Btn>
      </div>
      <div style={{marginBottom:"0.8rem",fontSize:"0.82rem",color:"#64748b"}}>Date : {fd(p.date)}</div>
      <Row n={2}>
        <F label="Debut"><input type="time" style={inp} value={f.debut} onChange={ev=>setF(x=>({...x,debut:ev.target.value}))}/></F>
        <F label="Fin"><input type="time" style={inp} value={f.fin} onChange={ev=>setF(x=>({...x,fin:ev.target.value}))}/></F>
      </Row>
      <Row n={2}>
        <F label="Pause (min)"><input type="number" style={inp} value={f.pause} min="0" onChange={ev=>setF(x=>({...x,pause:ev.target.value}))}/></F>
        <F label="Grand deplacement (h)"><input type="number" style={inp} value={f.grandDeplacement} min="0" step="0.5" onChange={ev=>setF(x=>({...x,grandDeplacement:ev.target.value}))}/></F>
      </Row>
      <Row n={2}>
        <F label="Frais (EUR)"><input type="number" style={inp} value={f.frais} min="0" step="0.01" onChange={ev=>setF(x=>({...x,frais:ev.target.value}))}/></F>
        <F label="Nature frais"><input type="text" style={inp} value={f.fraisNote} onChange={ev=>setF(x=>({...x,fraisNote:ev.target.value}))}/></F>
      </Row>
      <F label="Note"><input type="text" style={inp} value={f.note} onChange={ev=>setF(x=>({...x,note:ev.target.value}))}/></F>
      {f.debut&&f.fin&&(()=>{const h=calcH(f.debut,f.fin,Number(f.pause||0));if(h.total>0)return<div style={{background:BLL,border:"1px solid "+BL3,borderRadius:8,padding:"0.8rem",marginTop:"0.8rem",fontSize:"0.82rem"}}>Total : <b>{fmt(h.total)}</b> | Jour : {fmt(h.jour)} | Nuit : {fmt(h.nuit)}</div>;})()}
      <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={onClose}>Annuler</Btn><Btn v="p" onClick={save}>Enregistrer</Btn></div>
    </div>
  </div>;
}

function ModalEditC({c,emp,onSave,onClose}){
  const[f,setF]=React.useState({type:c.type,debut:c.debut||"",fin:c.fin||"",note:c.note||""});
  const e=emp.find(x=>x.id===c.empId);
  return <div style={modal_} onClick={ev=>ev.target===ev.currentTarget&&onClose()}>
    <div style={{...mbox_,maxWidth:500}}>
      <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>
        Modifier absence{e?" - "+e.nom+" "+e.prenom:""}
        <Btn v="g" style={{padding:"4px 10px"}} onClick={onClose}>&times;</Btn>
      </div>
      <F label="Type"><select style={inp} value={f.type} onChange={ev=>setF(x=>({...x,type:ev.target.value}))}>
        <option value="CP">CP - Conges payes</option><option value="Sans solde">Conge sans solde</option>
        <option value="Maladie">Arret maladie</option><option value="Formation">Formation</option>
        <option value="Absence CFA">Absence CFA</option><option value="Autre">Autre</option>
      </select></F>
      <Row n={2}>
        <F label="Debut"><input type="date" style={inp} value={f.debut} onChange={ev=>setF(x=>({...x,debut:ev.target.value}))}/></F>
        <F label="Fin"><input type="date" style={inp} value={f.fin} onChange={ev=>setF(x=>({...x,fin:ev.target.value}))}/></F>
      </Row>
      <F label="Note"><input type="text" style={inp} value={f.note} onChange={ev=>setF(x=>({...x,note:ev.target.value}))}/></F>
      {f.debut&&f.fin&&(()=>{const j=jOuv(f.debut,f.fin);return j>0?<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",color:"#166534",borderRadius:8,padding:"8px 12px",fontSize:"0.8rem",marginTop:"0.5rem"}}>{j} jour{j>1?"s":""} ouvre{j>1?"s":""}</div>:null;})()}
      <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={onClose}>Annuler</Btn><Btn v="p" onClick={()=>onSave(c.id,f)}>Enregistrer</Btn></div>
    </div>
  </div>;
}

function ModalEditEmp({e,onSave,onClose,depts}){
  const[f,setF]=React.useState({nom:e.nom,prenom:e.prenom,poste:e.poste,dept:e.dept,sal:e.sal,hm:e.hm,statut:e.statut,debut:e.debut,type:e.type});
  return <div style={modal_} onClick={ev=>ev.target===ev.currentTarget&&onClose()}>
    <div style={mbox_}>
      <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:"1.4rem",color:BL,display:"flex",justifyContent:"space-between"}}>
        Modifier - {e.nom} {e.prenom}
        <Btn v="g" style={{padding:"4px 10px"}} onClick={onClose}>&times;</Btn>
      </div>
      <Row n={2}>
        <F label="Nom"><input type="text" style={inp} value={f.nom} onChange={ev=>setF(x=>({...x,nom:ev.target.value.toUpperCase()}))}/></F>
        <F label="Prenom"><input type="text" style={inp} value={f.prenom} onChange={ev=>setF(x=>({...x,prenom:ev.target.value}))}/></F>
      </Row>
      <Row n={2}>
        <F label="Poste"><input type="text" style={inp} value={f.poste} onChange={ev=>setF(x=>({...x,poste:ev.target.value}))}/></F>
        <F label="Departement"><select style={inp} value={f.dept} onChange={ev=>setF(x=>({...x,dept:ev.target.value}))}>{depts.map(d=><option key={d} value={d}>{d}</option>)}</select></F>
      </Row>
      <Row n={3}>
        <F label="Salaire (EUR)"><input type="number" style={inp} value={f.sal} onChange={ev=>setF(x=>({...x,sal:ev.target.value}))}/></F>
        <F label="Heures/mois"><input type="number" style={inp} value={f.hm} onChange={ev=>setF(x=>({...x,hm:ev.target.value}))}/></F>
        <F label="Contrat"><select style={inp} value={f.statut} onChange={ev=>setF(x=>({...x,statut:ev.target.value}))}><option value="CDI">CDI</option><option value="CDD">CDD</option><option value="Interim">Interim</option></select></F>
      </Row>
      <Row n={2}>
        <F label="Date recrutement"><input type="date" style={inp} value={f.debut} onChange={ev=>setF(x=>({...x,debut:ev.target.value}))}/></F>
        <F label="Profil"><select style={inp} value={f.type} onChange={ev=>setF(x=>({...x,type:ev.target.value}))}><option value="normal">Salarie normal</option><option value="apprenti">Apprenti</option></select></F>
      </Row>
      <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:"1rem"}}><Btn v="g" onClick={onClose}>Annuler</Btn><Btn v="p" onClick={()=>onSave(e.id,{...f,sal:Number(f.sal),hm:Number(f.hm)})}>Enregistrer</Btn></div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
